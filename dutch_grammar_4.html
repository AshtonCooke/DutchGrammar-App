function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─── SHARED HELPERS ──────────────────────────────────────────────────────────

function Ring({ pct, size = 60, color = "#7c3aed" }) {
  const r = (size - 8) / 2;
  const circ = 2 * Math.PI * r;
  const dash = (pct / 100) * circ;
  return (
    <svg width={size} height={size} style={{ display: "block" }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e2e8f0" strokeWidth={6}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={6}
        strokeDasharray={`${dash} ${circ - dash}`} strokeLinecap="round"
        transform={`rotate(-90 ${size/2} ${size/2})`}
        style={{ transition: "stroke-dasharray 0.4s" }}/>
      <text x={size/2} y={size/2+5} textAnchor="middle" fontSize={12} fontWeight="bold" fill={color}>{pct}%</text>
    </svg>
  );
}

function HetErRules() {
  const het = RULES.filter(r => r.word === "het");
  const er  = RULES.filter(r => r.word === "er");
  function Section({ rules, label, color, bg, border }) {
    return (
      <div style={{ marginBottom: 24 }}>
        <h2 style={{ color, fontSize: 20, marginBottom: 10 }}>«{label}»</h2>
        {rules.map(r => (
          <div key={r.id} style={{ background: bg, border: `1.5px solid ${border}`, borderRadius: 10, padding: 16, marginBottom: 12 }}>
            <div style={{ fontWeight: "bold", color: "#1e293b", fontSize: 14, marginBottom: 5 }}>{r.title}</div>
            <div style={{ color: "#475569", fontSize: 13, marginBottom: 8 }}>{r.explanation}</div>
            {r.examples.map((ex, i) => (
              <div key={i} style={{ fontSize: 13, marginBottom: 3, flexWrap: "wrap", display: "flex", gap: 8 }}>
                <span style={{ fontStyle: "italic", color: "#1e293b" }}>{ex.nl}</span>
                <span style={{ color: "#94a3b8", fontSize: 12 }}>— {ex.en}</span>
              </div>
            ))}
          </div>
        ))}
      </div>
    );
  }
  return (
    <div>
      <Section rules={het} label="het" color="#2563eb" bg="#eff6ff" border="#bfdbfe"/>
      <Section rules={er}  label="er"  color="#16a34a" bg="#f0fdf4" border="#bbf7d0"/>
      <div style={{ background: "#fef9c3", border: "1.5px solid #fde047", borderRadius: 10, padding: 14 }}>
        <strong>💡 Golden rule:</strong> Preposition present (van, in, op, aan…)? → <span style={{ color: "#16a34a", fontWeight: "bold" }}>er</span>. No preposition? → <span style={{ color: "#2563eb", fontWeight: "bold" }}>het</span>.
      </div>
    </div>
  );
}

function HetErFlashcards() {
  const [queue, setQueue] = useState(() => shuffle(RULES).map((c, i) => ({ ...c, due: i })));
  const [flipped, setFlipped] = useState(false);
  const [known, setKnown] = useState([]);
  const total = RULES.length;
  const mastered = [...new Set(known)].length;
  const pct = Math.round((mastered / total) * 100);
  const card = queue[0];
  const done = queue.length === 0;

  function next(verdict) {
    setFlipped(false);
    setQueue(q => {
      const [cur, ...rest] = q;
      if (verdict === "unsure") {
        const pos = Math.min(3, rest.length);
        return [...rest.slice(0, pos), cur, ...rest.slice(pos)];
      }
      setKnown(k => [...k, cur.id]);
      return rest;
    });
  }
  function restart() { setQueue(shuffle(RULES).map((c,i)=>({...c,due:i}))); setFlipped(false); setKnown([]); }

  if (done) return (
    <div style={{ textAlign: "center", padding: 40 }}>
      <Ring pct={100} size={80} color="#16a34a"/>
      <h2 style={{ margin: "16px 0 8px", color: "#1e293b" }}>All {total} rules mastered!</h2>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, justifyContent: "center", marginBottom: 24 }}>
        {RULES.map(r => <span key={r.id} style={{ padding: "3px 10px", borderRadius: 20, fontSize: 12, background: "#dcfce7", color: "#16a34a" }}>✓ {r.title}</span>)}
      </div>
      <button onClick={restart} style={btnStyle("#1e293b")}>↺ Restart</button>
    </div>
  );

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 16 }}>
        <Ring pct={pct} size={52} color="#2563eb"/>
        <div style={{ flex: 1 }}>
          <div style={{ height: 7, background: "#e2e8f0", borderRadius: 4, overflow: "hidden" }}>
            <div style={{ width: `${pct}%`, height: "100%", background: "#2563eb", borderRadius: 4, transition: "width 0.4s" }}/>
          </div>
          <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 3 }}>{mastered}/{total} mastered · {queue.length} left</div>
        </div>
      </div>
      <div onClick={() => setFlipped(f => !f)} style={{
        background: flipped ? card.bg : "white", border: `2px solid ${flipped ? card.border : "#e2e8f0"}`,
        borderRadius: 14, padding: 28, minHeight: 200, cursor: "pointer", transition: "all 0.2s", marginBottom: 16,
        display: "flex", flexDirection: "column", justifyContent: "center",
      }}>
        {!flipped ? (
          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: 11, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1, marginBottom: 14 }}>Tap to reveal</div>
            <div style={{ fontSize: 20, fontWeight: "bold", color: "#1e293b", marginBottom: 8 }}>{card.title}</div>
            <div style={{ fontSize: 13, color: "#64748b" }}>
              «<span style={{ color: "#2563eb", fontWeight: "bold" }}>het</span>» or «<span style={{ color: "#16a34a", fontWeight: "bold" }}>er</span>»?
            </div>
          </div>
        ) : (
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>

            </div>
            <p style={{ color: "#334155", fontSize: 13, marginBottom: 12 }}>{card.explanation}</p>
            {card.examples.map((ex, i) => (
              <div key={i} style={{ fontSize: 12, marginBottom: 4 }}>
                <span style={{ fontStyle: "italic", color: "#1e293b" }}>{ex.nl}</span>
                <span style={{ color: "#94a3b8" }}> — {ex.en}</span>
              </div>
            ))}
          </div>
        )}
      </div>
      {flipped ? (
        <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
          <button onClick={() => next("unsure")} style={{ ...btnStyle("#dc2626"), background: "#fee2e2", flex: 1, maxWidth: 180 }}>😕 Again soon</button>
          <button onClick={() => next("know")}   style={{ ...btnStyle("#16a34a"), background: "#dcfce7", flex: 1, maxWidth: 180 }}>✓ Got it!</button>

function HetErQuiz() {
  const [difficulty, setDifficulty] = useState(null);
  const [questions, setQuestions] = useState([]);
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const [answers, setAnswers] = useState([]);

  function start(diff) {
    const pool = QUIZ_QUESTIONS.filter(q => q.difficulty === diff || diff === "all");
    setQuestions(shuffle(pool)); setDifficulty(diff);
    setIdx(0); setSelected(null); setScore(0); setDone(false); setAnswers([]);
  }

  if (!difficulty) return (
    <div>
      <h3 style={{ color: "#1e293b", marginBottom: 14 }}>Choose difficulty</h3>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
        {[
          { key: "easy", label: "😊 Easy", desc: "20 q · het or er", color: "#16a34a", bg: "#f0fdf4", border: "#bbf7d0" },
          { key: "hard", label: "🔥 Hard", desc: "5 tricky · includes het én er", color: "#dc2626", bg: "#fef2f2", border: "#fecaca" },
          { key: "all",  label: "⚡ All",  desc: "25 q · full mix", color: "#7c3aed", bg: "#f5f3ff", border: "#ddd6fe" },
        ].map(d => (
          <button key={d.key} onClick={() => start(d.key)} style={{
            flex: 1, minWidth: 130, padding: "16px 12px", borderRadius: 12,
            border: `2px solid ${d.border}`, background: d.bg, cursor: "pointer", textAlign: "left",
          }}>
            <div style={{ fontSize: 16, fontWeight: "bold", color: d.color, marginBottom: 4 }}>{d.label}</div>
            <div style={{ fontSize: 12, color: "#64748b" }}>{d.desc}</div>
          </button>
        ))}
      </div>
    </div>
  );

  const q = questions[idx];
  const rule = RULES.find(r => r.id === q?.rule);
  const options = q ? shuffle([q.answer, q.answer.toLowerCase().startsWith("h") ? "er" : "het", "het én er"]) : [];
  const isCorrect = selected && selected.toLowerCase() === q.answer.toLowerCase();

  function choose(opt) {
    if (selected) return;
    setSelected(opt);
    if (opt.toLowerCase() === q.answer.toLowerCase()) setScore(s => s+1);
    setAnswers(prev => [...prev, { q, chosen: opt, correct: opt.toLowerCase() === q.answer.toLowerCase() }]);
  }
  function next() { setSelected(null); if (idx+1 >= questions.length) setDone(true); else setIdx(i=>i+1); }

  if (done) {
    const pct = Math.round((score/questions.length)*100);
    return (
      <div>
        <div style={{ textAlign: "center", marginBottom: 20 }}>
          <Ring pct={pct} size={72} color={pct>=80?"#16a34a":pct>=60?"#ca8a04":"#dc2626"}/>
          <h2 style={{ margin: "10px 0 4px", color: "#1e293b" }}>{score}/{questions.length} — {pct}%</h2>
          <p style={{ color: "#64748b", fontSize: 13 }}>{pct===100?"Perfectionist! 🇳🇱":pct>=80?"Uitstekend!":pct>=60?"Good effort!":"Study the rules first."}</p>
        </div>
        {answers.map((a,i) => (
          <div key={i} style={{ display:"flex", gap:8, padding:"8px 12px", borderRadius:8, marginBottom:6, background:a.correct?"#f0fdf4":"#fef2f2", border:`1px solid ${a.correct?"#bbf7d0":"#fecaca"}` }}>
            <span>{a.correct?"✅":"❌"}</span>
            <div style={{ fontSize: 13 }}>
              <div style={{ fontStyle: "italic", color: "#1e293b" }}>{a.q.sentence}</div>
              {!a.correct && <div style={{ color: "#dc2626" }}>You: <b>{a.chosen}</b> · Correct: <b style={{color:"#16a34a"}}>{a.q.answer}</b></div>}
            </div>
          </div>
        ))}
        <div style={{ display:"flex", gap:10, justifyContent:"center", marginTop:16 }}>
          <button onClick={() => setDifficulty(null)} style={btnStyle("#64748b", "#e2e8f0")}>← Change</button>
          <button onClick={() => start(difficulty)} style={btnStyle("white", "#1e293b")}>↺ Try again</button>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:16 }}>
        <div style={{ flex:1, height:7, background:"#e2e8f0", borderRadius:4, overflow:"hidden" }}>
          <div style={{ width:`${(idx/questions.length)*100}%`, height:"100%", background:"#6366f1", borderRadius:4, transition:"width 0.3s" }}/>
        </div>
        <span style={{ fontSize:12, color:"#64748b" }}>{idx+1}/{questions.length} · 🏅{score}</span>
      </div>
      <div style={{ background:"white", border:"1.5px solid #e2e8f0", borderRadius:12, padding:22, marginBottom:16 }}>
        <div style={{ fontSize:11, color:"#94a3b8", textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>Fill in the blank</div>
        <div style={{ fontSize:18, color:"#1e293b", fontStyle:"italic", marginBottom:6 }}>{q.sentence}</div>
        <div style={{ fontSize:13, color:"#94a3b8" }}>🇬🇧 {q.en}</div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:16 }}>
        {options.map(opt => {
          const picked = !!selected, isThis = opt.toLowerCase()===q.answer.toLowerCase();
          let bg="white", border="#e2e8f0", color="#1e293b";
          if (picked) { if (isThis){bg="#f0fdf4";border="#16a34a";color="#16a34a";} else if(opt===selected){bg="#fef2f2";border="#dc2626";color="#dc2626";} }
          return <button key={opt} onClick={()=>choose(opt)} style={{ padding:"12px 6px", borderRadius:9, border:`2px solid ${border}`, background:bg, color, fontSize:15, fontWeight:"bold", cursor:picked?"default":"pointer", transition:"all 0.15s" }}>{opt}</button>;
        })}
      </div>
      {selected && (
        <div style={{ background:isCorrect?"#f0fdf4":"#fef2f2", border:`1.5px solid ${isCorrect?"#86efac":"#fca5a5"}`, borderRadius:10, padding:14, marginBottom:14 }}>
          <div style={{ fontWeight:"bold", color:isCorrect?"#16a34a":"#dc2626", marginBottom:6 }}>{isCorrect?"✅ Correct!": `❌ Answer: «${q.answer}»`}</div>
          <div style={{ fontStyle:"italic", color:"#1e293b", fontSize:13, marginBottom:4 }}>🇳🇱 {q.sentence.split("___").join(`«${q.answer}»`)}</div>
          {rule && <div style={{ fontSize:12, color:"#475569" }}><b>Rule:</b> {rule.title} — {rule.explanation}</div>}
        </div>
      )}
      {selected && <div style={{ textAlign:"center" }}><button onClick={next} style={btnStyle("white","#1e293b")}>{idx+1<questions.length?"Next →":"See results"}</button></div>}
    </div>
  );
}

const ALL_RULE_IDS = [...new Set(EXERCISES.map(e => e.rule))];

function HetErExercise() {
  const [inputs, setInputs] = useState({});
  const [checked, setChecked] = useState(false);
  const [showHints, setShowHints] = useState({});
  const [showEn, setShowEn] = useState(true);
  const [score, setScore] = useState(null);
  const [activeRules, setActiveRules] = useState(new Set(ALL_RULE_IDS));
  const [revealMode, setRevealMode] = useState(false);
  const [revealed, setRevealed] = useState({});

  const filtered = EXERCISES.map((ex,i)=>({...ex,origIdx:i})).filter(ex=>activeRules.has(ex.rule));
  const ruleColors = { "het-pronoun":"#2563eb","het-weather":"#2563eb","het-fixed":"#2563eb","het-no-prep":"#2563eb","er-preposition":"#16a34a","er-existential":"#16a34a","er-number":"#16a34a","er-place":"#16a34a" };

  function toggleRule(id) { setActiveRules(prev => { const n=new Set(prev); if(n.has(id)){if(n.size>1)n.delete(id);}else n.add(id); return n; }); reset(); }
  function isCorrect(i) { return (inputs[i]||"").trim().toLowerCase()===EXERCISES[i].answers.map(a=>a.toLowerCase()).join(" "); }
  function check() { setChecked(true); setScore(filtered.filter(ex=>isCorrect(ex.origIdx)).length); }
  function reset() { setInputs({}); setChecked(false); setScore(null); setShowHints({}); setRevealed({}); }

  return (
    <div>
      <div style={{ marginBottom:14 }}>
        <div style={{ fontSize:11, color:"#64748b", marginBottom:6, fontWeight:"bold", textTransform:"uppercase", letterSpacing:0.5 }}>Filter by rule</div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
          <button onClick={()=>{setActiveRules(new Set(ALL_RULE_IDS));reset();}} style={{ padding:"4px 10px", borderRadius:20, fontSize:11, fontWeight:"bold", cursor:"pointer", border:`1.5px solid ${activeRules.size===ALL_RULE_IDS.length?"#475569":"#e2e8f0"}`, background:activeRules.size===ALL_RULE_IDS.length?"#475569":"white", color:activeRules.size===ALL_RULE_IDS.length?"white":"#64748b" }}>All</button>
          {ALL_RULE_IDS.map(id => (
            <button key={id} onClick={()=>toggleRule(id)} style={{ padding:"4px 10px", borderRadius:20, fontSize:11, fontWeight:"bold", cursor:"pointer", border:`1.5px solid ${activeRules.has(id)?ruleColors[id]:"#e2e8f0"}`, background:activeRules.has(id)?ruleColors[id]:"white", color:activeRules.has(id)?"white":"#64748b" }}>
              {RULE_LABELS[id]}
            </button>
          ))}
        </div>
      </div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, flexWrap:"wrap", gap:6 }}>
        <span style={{ fontSize:12, color:"#64748b" }}>{filtered.length} sentences</span>
        <div style={{ display:"flex", gap:6 }}>
          <button onClick={()=>{setRevealMode(m=>!m);reset();}} style={{ padding:"5px 10px", borderRadius:16, border:"1.5px solid #e2e8f0", background:revealMode?"#fef9c3":"white", color:revealMode?"#92400e":"#94a3b8", fontSize:11, cursor:"pointer", fontWeight:"bold" }}>👁 Reveal {revealMode?"on":"off"}</button>
          <button onClick={()=>setShowEn(e=>!e)} style={{ padding:"5px 10px", borderRadius:16, border:"1.5px solid #e2e8f0", background:showEn?"#eff6ff":"white", color:showEn?"#2563eb":"#94a3b8", fontSize:11, cursor:"pointer", fontWeight:"bold" }}>🇬🇧 EN {showEn?"on":"off"}</button>
        </div>
      </div>
      {filtered.map(ex => {
        const i=ex.origIdx, multi=ex.answers.length>1, correct=checked&&isCorrect(i), wrong=checked&&!isCorrect(i);
        return (
          <div key={i} style={{ background:"white", border:checked?`1.5px solid ${correct?"#bbf7d0":"#fecaca"}`:"1.5px solid #e2e8f0", borderRadius:9, padding:"12px 16px", marginBottom:8, display:"flex", alignItems:"flex-start", gap:10, flexWrap:"wrap" }}>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:11, color:ruleColors[ex.rule], fontWeight:"bold", marginBottom:2 }}>{RULE_LABELS[ex.rule]}</div>
              <div style={{ fontSize:14, color:"#1e293b", lineHeight:1.6 }}>{ex.sentence}</div>
              {showEn&&ex.en&&<div style={{ fontSize:11, color:"#94a3b8", fontStyle:"italic", marginTop:2 }}>🇬🇧 {ex.en}</div>}
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>
              {revealMode ? (
                <button onClick={()=>setRevealed(r=>({...r,[i]:!r[i]}))} style={{ padding:"6px 14px", borderRadius:7, cursor:"pointer", fontSize:13, fontWeight:"bold", border:`2px solid ${revealed[i]?"#16a34a":"#e2e8f0"}`, background:revealed[i]?"#f0fdf4":"#f8fafc", color:revealed[i]?"#16a34a":"#94a3b8", minWidth:70 }}>
                  {revealed[i]?ex.answers.join(" / "):"___"}
                </button>
              ) : (
                <>
                  <input value={inputs[i]||""} onChange={e=>{setInputs(p=>({...p,[i]:e.target.value}));setChecked(false);setScore(null);}}
                    placeholder={multi?"e.g. er er":"het/er"}
                    style={{ width:multi?90:60, padding:"5px 8px", borderRadius:6, fontSize:13, border:checked?`2px solid ${correct?"#16a34a":"#dc2626"}`:"1.5px solid #cbd5e1", outline:"none", textAlign:"center" }}
                    onKeyDown={e=>e.key==="Enter"&&check()}/>
                  {checked&&<span style={{fontSize:16}}>{correct?"✅":"❌"}</span>}
                  {wrong&&<span style={{color:"#16a34a",fontWeight:"bold",fontSize:12}}>→ {ex.answers.join(" ")}</span>}
                </>
              )}
            </div>
            {!revealMode&&(
              <div style={{ width:"100%", marginTop:2 }}>
                <button onClick={()=>setShowHints(p=>({...p,[i]:!p[i]}))} style={{ fontSize:11, color:"#94a3b8", background:"none", border:"none", cursor:"pointer", padding:0 }}>
                  {showHints[i]?"▲ hide hint":"▼ hint"}
                </button>
                {showHints[i]&&<span style={{fontSize:11,color:"#64748b",marginLeft:6}}>💡 {ex.hint}</span>}
              </div>
            )}
          </div>
        );
      })}
      {!revealMode&&filtered.length>0&&(
        <>
          {score!==null&&<div style={{background:score===filtered.length?"#f0fdf4":score>=filtered.length*0.7?"#fefce8":"#fef2f2",border:`1.5px solid ${score===filtered.length?"#86efac":score>=filtered.length*0.7?"#fde047":"#fca5a5"}`,borderRadius:10,padding:14,textAlign:"center",marginBottom:12,fontSize:16}}>{score===filtered.length?"🎉 Perfect!":score>=filtered.length*0.7?"👍 Good!":"📚 Keep going!"}{" "}<strong>{score}/{filtered.length}</strong></div>}
          <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:6}}>
            <button onClick={check} style={btnStyle("white","#1e293b")}>✓ Check</button>
            <button onClick={reset} style={btnStyle("#475569","#e2e8f0")}>↺ Reset</button>
          </div>
        </>
      )}
    </div>
  );
}

const SEP_PREFIXES = [...new Set(SEP_VERBS.map(v => v.prefix))].sort();

function buildConjugation(v) {
  const s = v.stem.endsWith("en") ? v.stem.slice(0,-2) : v.stem;
  const addT = s.endsWith("t") ? s : s+"t";
  return [
    {pro:"ik",     form:`${s} … ${v.prefix}`},
    {pro:"jij/u",  form:`${addT} … ${v.prefix}`},
    {pro:"hij/zij",form:`${addT} … ${v.prefix}`},
    {pro:"wij",    form:v.nl.toLowerCase()},
    {pro:"jullie", form:v.nl.toLowerCase()},
    {pro:"zij",    form:v.nl.toLowerCase()},
  ];
}

function SepList() {
  const [search, setSearch] = useState("");
  const [filterPrefix, setFilterPrefix] = useState("all");
  const [expanded, setExpanded] = useState(null);
  const [showFr, setShowFr] = useState(false);

  const filtered = SEP_VERBS.filter(v => {
    const q = search.toLowerCase();
    return (v.nl.toLowerCase().includes(q)||v.en.toLowerCase().includes(q)) && (filterPrefix==="all"||v.prefix===filterPrefix);
  });

  return (
    <div>
      <div style={{ background:"#f5f3ff", border:"1.5px solid #ddd6fe", borderRadius:10, padding:12, marginBottom:14, fontSize:13, color:"#475569" }}>
        <strong style={{color:"#7c3aed"}}>📌 How splitting works:</strong>{" "}
        Main clause: prefix → end (<em>Ik zet de TV <b>aan</b></em>).
        After modal/om: together (<em>moet <b>aanzetten</b></em>).
        Perfect: ge- between (<em>aan<b>ge</b>zet</em>). Tap a verb to see conjugation.
      </div>
      <div style={{ display:"flex", gap:8, marginBottom:10, flexWrap:"wrap" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search verb or meaning…"
          style={{ flex:1, minWidth:130, padding:"7px 11px", borderRadius:7, border:"1.5px solid #e2e8f0", fontSize:13, outline:"none" }}/>
        <select value={filterPrefix} onChange={e=>setFilterPrefix(e.target.value)} style={{ padding:"7px 11px", borderRadius:7, border:"1.5px solid #e2e8f0", fontSize:13, background:"white" }}>
          <option value="all">All prefixes</option>
          {SEP_PREFIXES.map(p=><option key={p} value={p}>{p}-</option>)}
        </select>
        <button onClick={()=>setShowFr(f=>!f)} style={{ padding:"7px 11px", borderRadius:7, border:"1.5px solid #e2e8f0", background:showFr?"#fef9c3":"white", color:showFr?"#92400e":"#94a3b8", fontSize:12, cursor:"pointer", fontWeight:"bold" }}>🇫🇷 {showFr?"on":"off"}</button>
      </div>
      <div style={{ fontSize:11, color:"#94a3b8", marginBottom:6 }}>{filtered.length} verbs — tap to conjugate</div>
      <div style={{ background:"white", borderRadius:10, border:"1.5px solid #e2e8f0", overflow:"hidden" }}>
        {filtered.map((v,i)=>{
          const isOpen = expanded===v.nl, conj = buildConjugation(v);
          return (
            <div key={v.nl}>
              <div onClick={()=>setExpanded(isOpen?null:v.nl)} style={{ display:"grid", gridTemplateColumns:showFr?"1.2fr 1fr 1fr":"1.2fr 1fr", padding:"9px 14px", borderBottom:(i<filtered.length-1&&!isOpen)?"1px solid #f1f5f9":"none", background:isOpen?"#f5f3ff":i%2===0?"white":"#fafafa", cursor:"pointer", alignItems:"center" }}>
                <div style={{ fontWeight:"bold" }}>
                  <span style={{color:"#7c3aed"}}>{v.prefix}</span><span style={{color:"#1e293b"}}>{v.nl.slice(v.prefix.length)}</span>
                </div>
                <div style={{color:"#475569",fontSize:13}}>🇬🇧 {v.en}</div>
                {showFr&&<div style={{color:"#92400e",fontSize:12}}>🇫🇷 {v.fr}</div>}
              </div>
              {isOpen&&(
                <div style={{ background:"#f5f3ff", borderBottom:"1px solid #ddd6fe", padding:"10px 14px 14px" }}>
                  <div style={{ fontSize:12, fontStyle:"italic", color:"#334155", marginBottom:10, borderLeft:"3px solid #a78bfa", paddingLeft:8 }}>
                    {v.example} <span style={{color:"#94a3b8"}}>— {v.exEn}</span>
                  </div>
                  <div style={{ fontSize:11, color:"#7c3aed", fontWeight:"bold", marginBottom:5, textTransform:"uppercase", letterSpacing:0.5 }}>Present tense</div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"3px 10px", marginBottom:8 }}>
                    {conj.map(row=>(
                      <div key={row.pro} style={{fontSize:12}}>
                        <span style={{color:"#94a3b8",marginRight:4}}>{row.pro}</span>
                        <span style={{color:"#1e293b",fontWeight:"bold"}}>{row.form}</span>
                      </div>
                    ))}
                  </div>
                  <div style={{fontSize:11,color:"#64748b"}}>Perfect: <em>{v.prefix}ge{v.stem.endsWith("en")?v.stem.slice(0,-2):v.stem}d/t</em></div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function SepFlashcards() {
  const [queue, setQueue] = useState(() => shuffle(SEP_VERBS));
  const [flipped, setFlipped] = useState(false);
  const [known, setKnown] = useState([]);
  const total = SEP_VERBS.length;
  const pct = Math.round((known.length/total)*100);
  const card = queue[0];
  const done = queue.length===0;

  function next(verdict) {
    setFlipped(false);
    setQueue(q => {
      const [cur,...rest]=q;
      if(verdict==="unsure"){const pos=Math.min(3,rest.length);return [...rest.slice(0,pos),cur,...rest.slice(pos)];}
      setKnown(k=>[...k,cur.nl]);
      return rest;
    });
  }
  function restart(){setQueue(shuffle(SEP_VERBS));setFlipped(false);setKnown([]);}

  if(done) return(
    <div style={{textAlign:"center",padding:40}}>
      <Ring pct={100} size={80} color="#7c3aed"/>
      <h2 style={{margin:"16px 0 8px",color:"#1e293b"}}>All {total} verbs done!</h2>
      <p style={{color:"#64748b",marginBottom:20}}>You mastered {known.length} verbs this session.</p>
      <button onClick={restart} style={btnStyle("white","#7c3aed")}>↺ Restart</button>
    </div>
  );

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
        <Ring pct={pct} size={52}/>
        <div style={{flex:1}}>
          <div style={{height:7,background:"#e2e8f0",borderRadius:4,overflow:"hidden"}}>
            <div style={{width:`${pct}%`,height:"100%",background:"#7c3aed",borderRadius:4,transition:"width 0.4s"}}/>
          </div>
          <div style={{fontSize:11,color:"#94a3b8",marginTop:3}}>{known.length}/{total} mastered · {queue.length} left</div>
        </div>
      </div>
      <div onClick={()=>setFlipped(f=>!f)} style={{background:flipped?"#f5f3ff":"white",border:`2px solid ${flipped?"#a78bfa":"#e2e8f0"}`,borderRadius:14,padding:28,minHeight:200,cursor:"pointer",transition:"all 0.2s",marginBottom:14,display:"flex",flexDirection:"column",justifyContent:"center"}}>
        {!flipped?(
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:11,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1,marginBottom:14}}>Tap to reveal</div>
            <div style={{fontSize:28,fontWeight:"bold",color:"#7c3aed",marginBottom:6}}>{card.nl}</div>
            <div style={{fontSize:13,color:"#64748b"}}>What does this mean?</div>
          </div>
        ):(
          <div>
            <div style={{fontSize:22,fontWeight:"bold",color:"#7c3aed",marginBottom:5}}>{card.nl}</div>

            <div style={{fontSize:12,fontStyle:"italic",color:"#334155",borderLeft:"3px solid #ddd6fe",paddingLeft:8}}>{card.example} <span style={{color:"#94a3b8"}}>— {card.exEn}</span></div>

          <button onClick={()=>next("know")}   style={{...btnStyle("#7c3aed","#f5f3ff"),flex:1,maxWidth:180}}>✓ Got it!</button>
        </div>
      ):(
        <div style={{textAlign:"center",color:"#94a3b8",fontSize:12}}>👆 Tap card to reveal</div>
      )}
    </div>
  );
}

function SepQuiz() {
  const [questions, setQuestions] = useState(null);
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const [answers, setAnswers] = useState([]);

  function start() {
    const qs = shuffle(SEP_VERBS).slice(0,20).map(correct=>{
      const dist = shuffle(SEP_VERBS.filter(v=>v.nl!==correct.nl)).slice(0,3);
      return {correct, options:shuffle([correct,...dist])};
    });
    setQuestions(qs); setIdx(0); setSelected(null); setScore(0); setDone(false); setAnswers([]);
  }

  if(!questions) return(
    <div style={{textAlign:"center",padding:40}}>
      <div style={{fontSize:48,marginBottom:12}}>🎯</div>
      <h2 style={{color:"#1e293b",marginBottom:8}}>Verb Quiz</h2>
      <p style={{color:"#64748b",marginBottom:24,fontSize:13}}>See an English meaning, pick the correct Dutch verb. 20 questions, shuffled each time.</p>
      <button onClick={start} style={btnStyle("white","#7c3aed")}>Start quiz →</button>
    </div>
  );

  if(done){
    const pct=Math.round((score/questions.length)*100);
    return(
      <div>
        <div style={{textAlign:"center",marginBottom:20}}>
          <Ring pct={pct} size={72} color={pct>=80?"#16a34a":pct>=60?"#ca8a04":"#dc2626"}/>
          <h2 style={{margin:"10px 0 4px",color:"#1e293b"}}>{score}/{questions.length}</h2>
          <p style={{color:"#64748b",fontSize:13}}>{pct>=80?"Uitstekend! 🇳🇱":pct>=60?"Good effort!":"Keep practising!"}</p>
        </div>
        {answers.map((a,i)=>(
          <div key={i} style={{display:"flex",gap:8,padding:"8px 12px",borderRadius:8,marginBottom:6,background:a.correct?"#f0fdf4":"#fef2f2",border:`1px solid ${a.correct?"#bbf7d0":"#fecaca"}`}}>
            <span>{a.correct?"✅":"❌"}</span>
            <div style={{fontSize:13}}>
              <div style={{color:"#64748b"}}>{a.q.correct.en}</div>
              {!a.correct&&<div style={{color:"#dc2626"}}>You: <b>{a.chosen}</b> · Correct: <b style={{color:"#16a34a"}}>{a.q.correct.nl}</b></div>}
            </div>
          </div>
        ))}
        <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:16}}>
          <button onClick={()=>setQuestions(null)} style={btnStyle("#475569","#e2e8f0")}>← Back</button>
          <button onClick={start} style={btnStyle("white","#7c3aed")}>↺ Try again</button>
        </div>
      </div>
    );
  }

  const q=questions[idx], isCorrect=selected&&selected===q.correct.nl;
  function choose(opt){if(selected)return;setSelected(opt);if(opt===q.correct.nl)setScore(s=>s+1);setAnswers(p=>[...p,{q,chosen:opt,correct:opt===q.correct.nl}]);}
  function next(){setSelected(null);if(idx+1>=questions.length)setDone(true);else setIdx(i=>i+1);}

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
        <div style={{flex:1,height:7,background:"#e2e8f0",borderRadius:4,overflow:"hidden"}}>
          <div style={{width:`${(idx/questions.length)*100}%`,height:"100%",background:"#7c3aed",borderRadius:4,transition:"width 0.3s"}}/>
        </div>
        <span style={{fontSize:12,color:"#64748b"}}>{idx+1}/{questions.length} · 🏅{score}</span>
      </div>
      <div style={{background:"white",border:"1.5px solid #e2e8f0",borderRadius:12,padding:22,marginBottom:14,textAlign:"center"}}>
        <div style={{fontSize:11,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Which Dutch verb means…</div>
        <div style={{fontSize:22,fontWeight:"bold",color:"#1e293b"}}>"{q.correct.en}"</div>
        <div style={{fontSize:13,color:"#92400e",marginTop:5}}>🇫🇷 {q.correct.fr}</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        {q.options.map(opt=>{
          const picked=!!selected,isThis=opt.nl===q.correct.nl;
          let bg="white",border="#e2e8f0",color="#1e293b";
          if(picked){if(isThis){bg="#f0fdf4";border="#16a34a";color="#16a34a";}else if(opt.nl===selected){bg="#fef2f2";border="#dc2626";color="#dc2626";}}
          return(
            <button key={opt.nl} onClick={()=>choose(opt.nl)} style={{padding:"13px 8px",borderRadius:9,border:`2px solid ${border}`,background:bg,color,fontSize:14,fontWeight:"bold",cursor:picked?"default":"pointer",transition:"all 0.15s"}}>
              <span style={{color:picked&&isThis?"#16a34a":picked&&opt.nl===selected?"#dc2626":"#7c3aed"}}>{opt.prefix}</span>{opt.nl.slice(opt.prefix.length)}
            </button>
          );
        })}
      </div>
      {selected&&(
        <div style={{background:isCorrect?"#f0fdf4":"#fef2f2",border:`1.5px solid ${isCorrect?"#86efac":"#fca5a5"}`,borderRadius:10,padding:12,marginBottom:12,fontSize:13}}>
          <div style={{fontWeight:"bold",color:isCorrect?"#16a34a":"#dc2626",marginBottom:4}}>{isCorrect?"✅ Correct!": `❌ It was: ${q.correct.nl}`}</div>
          <div style={{fontStyle:"italic",color:"#334155"}}>{q.correct.example}</div>
          <div style={{color:"#94a3b8",fontSize:11}}>{q.correct.exEn}</div>
        </div>
      )}
      {selected&&<div style={{textAlign:"center"}}><button onClick={next} style={btnStyle("white","#7c3aed")}>{idx+1<questions.length?"Next →":"See results"}</button></div>}
    </div>
  );
}


// ─── SEPARABLE VERB EXERCISE  ────────────────────────────────────────────────
//
// Each question presents:
//   • A sentence with numbered slot(s)  e.g.  "Ik [1] de televisie [2]."
//   • A word bank of tiles to tap into the slots
//
// EASY:  Dutch verb shown + type badge + hint button
// HARD:  English only, no verb cue, no hints
//
// Slot values are stored in slotState[qIdx][slotIdx]
// A tile that is already placed is "used" and shown as ghost in the bank.

function SepExercise() {
  const [difficulty, setDifficulty] = useState(null);
  // slotState: array (per question) of arrays (per slot) of placed tile string | null
  const [slots, setSlots] = useState(() => SEP_EXERCISES.map(ex => ex.blanks.map(() => null)));
  // which slot is "active" (awaiting a tap from the bank)  {q, s} | null
  const [active, setActive] = useState(null);
  const [checked, setChecked] = useState(false);
  const [hints, setHints] = useState({});
  const [score, setScore] = useState(null);

  const isEasy = difficulty === "easy";

  // ── correctness helpers ───────────────────────────────────────────────────
  function slotCorrect(q, s) {
    const placed = slots[q][s];
    return placed && placed.toLowerCase() === SEP_EXERCISES[q].blanks[s].answer.toLowerCase();
  }
  function questionCorrect(q) {
    return SEP_EXERCISES[q].blanks.every((_, s) => slotCorrect(q, s));
  }

  // ── interaction ───────────────────────────────────────────────────────────
  function tapSlot(q, s) {
    if (checked) return;
    // If already filled → clear it
    if (slots[q][s]) {
      setSlots(prev => { const n = prev.map(r => [...r]); n[q][s] = null; return n; });
      setActive(null);
      return;
    }
    setActive({ q, s });
  }

  function tapTile(tile) {
    if (!active) return;
    const { q, s } = active;
    setSlots(prev => { const n = prev.map(r => [...r]); n[q][s] = tile; return n; });
    setActive(null);
    setChecked(false); setScore(null);
  }

  function clearSlot(q, s) {
    setSlots(prev => { const n = prev.map(r => [...r]); n[q][s] = null; return n; });
    setActive(null);
    setChecked(false); setScore(null);
  }

  function check() {
    setActive(null);
    setChecked(true);
    setScore(SEP_EXERCISES.filter((_, q) => questionCorrect(q)).length);
  }

  function reset() {
    setSlots(SEP_EXERCISES.map(ex => ex.blanks.map(() => null)));
    setActive(null); setChecked(false); setScore(null); setHints({});
  }

  // ── which tiles are "used" in a question ─────────────────────────────────
  function usedTiles(q) {
    return slots[q].filter(Boolean).map(t => t.toLowerCase());
  }

  // ── single question card ──────────────────────────────────────────────────
  function QuestionCard({ ex, q }) {
    const correct   = checked && questionCorrect(q);
    const wrong     = checked && !questionCorrect(q);
    const isActiveQ = active?.q === q;

    const typeBadge = { split:"🔀 split", together:"🔗 together", perfect:"⏮ perfect" };
    const typeBg    = { split:"#ede9fe", together:"#dbeafe", perfect:"#fef9c3" };
    const typeClr   = { split:"#7c3aed", together:"#2563eb", perfect:"#92400e" };

    // Build sentence tokens — plain text parts interleaved with slot buttons
    const tokens = [];
    let blankIdx = 0;
    ex.parts.forEach((part, pi) => {
      if (part === "BLANK") {
        const s        = blankIdx++;
        const placed   = slots[q][s];
        const isActive = active?.q === q && active?.s === s;
        const sOk      = checked && slotCorrect(q, s);
        const sWrong   = checked && !slotCorrect(q, s);
        tokens.push(
          <span key={`slot-${s}`}
            onClick={() => tapSlot(q, s)}
            title={placed ? "Tap to clear" : "Tap to fill"}
            style={{
              display:"inline-flex", alignItems:"center", justifyContent:"center",
              minWidth:70, padding:"3px 10px", margin:"0 3px",
              borderRadius:6, cursor:"pointer", fontSize:13, fontWeight:"bold",
              border:`2px solid ${isActive?"#7c3aed": sOk?"#16a34a": sWrong?"#dc2626": placed?"#a78bfa":"#cbd5e1"}`,
              background: isActive?"#ede9fe": sOk?"#f0fdf4": sWrong?"#fef2f2": placed?"#f5f3ff":"#f8fafc",
              color: isActive?"#7c3aed": sOk?"#16a34a": sWrong?"#dc2626": placed?"#7c3aed":"#94a3b8",
              transition:"all 0.15s",
            }}>
            {placed
              ? <><span>{placed}</span><span style={{fontSize:9,marginLeft:4,opacity:0.5}}>✕</span></>
              : <span style={{letterSpacing:2}}>{isActive?"tap word":"___"}</span>
            }
          </span>
        );
      } else {
        tokens.push(<span key={`p-${pi}`} style={{color:"#1e293b"}}>{part}</span>);
      }
    });

    // Word bank for this question
    const used = usedTiles(q);
    const bankTiles = ex.bank.map((tile, ti) => {
      const isUsed = used.includes(tile.toLowerCase());
      return (
        <button key={ti} onClick={() => !isUsed && tapTile(tile)}
          style={{
            padding:"5px 12px", borderRadius:20, fontSize:13, fontWeight:"bold", cursor: isUsed?"default":"pointer",
            border:`1.5px solid ${isUsed?"#e2e8f0":"#a78bfa"}`,
            background: isUsed?"#f1f5f9":"white",
            color: isUsed?"#cbd5e1":"#7c3aed",
            opacity: isUsed ? 0.5 : 1,
            transition:"all 0.15s",
          }}>
          {tile}
        </button>
      );
    });

    return (
      <div style={{
        background:"white",
        border:`1.5px solid ${correct?"#bbf7d0":wrong?"#fecaca": isActiveQ?"#a78bfa":"#e2e8f0"}`,
        borderRadius:10, padding:"14px 16px", marginBottom:12,
      }}>
        {/* Header row */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
          <span style={{color:"#94a3b8",fontSize:11}}>{q+1}.</span>
          <span style={{padding:"2px 8px",borderRadius:10,fontSize:10,fontWeight:"bold",background:typeBg[ex.type],color:typeClr[ex.type]}}>{typeBadge[ex.type]}</span>
          {isEasy && <span style={{color:"#7c3aed",fontWeight:"bold",fontSize:11}}>({ex.verb})</span>}
          {checked && <span style={{marginLeft:"auto",fontSize:16}}>{correct?"✅":"❌"}</span>}
        </div>

        {/* EN always visible */}
        <div style={{fontSize:12,color:"#94a3b8",fontStyle:"italic",marginBottom:10}}>🇬🇧 {ex.en}</div>

        {/* Sentence with slots */}
        <div style={{fontSize:15,lineHeight:2.8,marginBottom:10,flexWrap:"wrap"}}>{tokens}</div>

        {/* Word bank */}
        {!checked && (
          <div style={{marginBottom:8}}>
            <div style={{fontSize:10,color:"#94a3b8",textTransform:"uppercase",letterSpacing:0.5,marginBottom:5}}>
              {isActiveQ ? "👆 Tap a word to place it:" : "Word bank — tap a slot first, then a word:"}
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{bankTiles}</div>
          </div>
        )}

        {/* After check: full sentence */}
        {checked && (
          <div style={{fontSize:11,color:"#475569",marginBottom:4}}>
            ✏️ <em style={{color:"#7c3aed"}}>{ex.full}</em>
          </div>
        )}
        {isEasy && checked && <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>📌 {ex.rule}</div>}

        {/* Hint (easy only) */}
        {isEasy && (
          <div>
            <button onClick={()=>setHints(h=>({...h,[q]:!h[q]}))}
              style={{fontSize:11,color:"#94a3b8",background:"none",border:"none",cursor:"pointer",padding:0}}>
              {hints[q]?"▲ hide hint":"▼ hint"}
            </button>
            {hints[q] && <div style={{fontSize:11,color:"#64748b",marginTop:4,background:"#f8fafc",padding:"6px 10px",borderRadius:6}}>💡 {ex.hint}</div>}
          </div>
        )}
      </div>
    );
  }

  // ── difficulty picker ─────────────────────────────────────────────────────
  if (!difficulty) return (
    <div>
      <h3 style={{color:"#1e293b",marginBottom:8,fontSize:16}}>Choose difficulty</h3>
      <p style={{color:"#64748b",fontSize:13,marginBottom:10}}>
        Each sentence has numbered slots. Tap a slot, then tap a word from the bank to place it. Tap a filled slot to clear it.
      </p>
      <div style={{background:"#f5f3ff",border:"1.5px solid #ddd6fe",borderRadius:9,padding:12,marginBottom:20,fontSize:13,color:"#475569"}}>
        <strong style={{color:"#7c3aed"}}>Three patterns:</strong>{" "}
        <span style={{background:"#ede9fe",padding:"1px 6px",borderRadius:4,marginRight:6}}>🔀 split</span> stem early + prefix at end ·{" "}
        <span style={{background:"#dbeafe",padding:"1px 6px",borderRadius:4,marginRight:6}}>🔗 together</span> full infinitive after modal/om ·{" "}
        <span style={{background:"#fef9c3",padding:"1px 6px",borderRadius:4}}>⏮ perfect</span> prefix+ge+stem
      </div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
        {[
          {key:"easy",label:"😊 Easy",color:"#16a34a",bg:"#f0fdf4",border:"#bbf7d0",desc:"Dutch verb shown as cue · hints available · rule shown after check"},
          {key:"hard",label:"🔥 Hard",color:"#dc2626",bg:"#fef2f2",border:"#fecaca",desc:"English translation only · no verb cue · no hints"},
        ].map(d=>(
          <button key={d.key} onClick={()=>setDifficulty(d.key)}
            style={{flex:1,minWidth:160,padding:"18px 14px",borderRadius:12,border:`2px solid ${d.border}`,background:d.bg,cursor:"pointer",textAlign:"left"}}>
            <div style={{fontSize:16,fontWeight:"bold",color:d.color,marginBottom:5}}>{d.label}</div>
            <div style={{fontSize:12,color:"#64748b"}}>{d.desc}</div>
          </button>
        ))}
      </div>
    </div>
  );

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <button onClick={()=>{setDifficulty(null);reset();}} style={{background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:12}}>← Change mode</button>
        <span style={{padding:"3px 10px",borderRadius:16,fontSize:11,fontWeight:"bold",background:isEasy?"#dcfce7":"#fee2e2",color:isEasy?"#16a34a":"#dc2626"}}>
          {isEasy?"😊 Easy":"🔥 Hard"}
        </span>
      </div>

      <div style={{background:"#f5f3ff",border:"1.5px solid #ddd6fe",borderRadius:9,padding:11,marginBottom:14,fontSize:12,color:"#475569"}}>
        👆 Tap a <strong>slot</strong> in the sentence, then tap a <strong>word</strong> from the bank below it. Tap a filled slot to remove it.
      </div>

      {SEP_EXERCISES.map((ex, q) => <QuestionCard key={q} ex={ex} q={q} />)}

      {score !== null && (
        <div style={{background:score===SEP_EXERCISES.length?"#f0fdf4":score>=SEP_EXERCISES.length*0.7?"#fefce8":"#fef2f2",border:`1.5px solid ${score===SEP_EXERCISES.length?"#86efac":score>=SEP_EXERCISES.length*0.7?"#fde047":"#fca5a5"}`,borderRadius:10,padding:14,textAlign:"center",marginBottom:12,fontSize:16}}>
          {score===SEP_EXERCISES.length?"🎉 Perfect!":score>=SEP_EXERCISES.length*0.7?"👍 Good!":"📚 Keep going!"}
          {" "}<strong>{score}/{SEP_EXERCISES.length}</strong>
        </div>
      )}
      <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:8}}>
        <button onClick={check} style={btnStyle("white","#7c3aed")}>✓ Check answers</button>
        <button onClick={reset} style={btnStyle("#475569","#e2e8f0")}>↺ Reset</button>
      </div>
    </div>
  );
}

function DeHetRules() {
  const hetRules = DEHET_RULES.filter(r => r.article === "het");
  const deRules  = DEHET_RULES.filter(r => r.article === "de");

  function Section({ rules, label, color, bg, border }) {
    return (
      <div style={{ marginBottom: 24 }}>
        <h2 style={{ color, fontSize: 20, marginBottom: 10 }}>«{label}» words</h2>
        {rules.map(r => (
          <div key={r.id} style={{ background: bg, border: `1.5px solid ${border}`, borderRadius: 10, padding: 16, marginBottom: 12 }}>
            <div style={{ fontWeight: "bold", color: "#1e293b", fontSize: 14, marginBottom: 5 }}>{r.title}</div>
            <div style={{ color: "#475569", fontSize: 13, marginBottom: 8 }}>{r.explanation}</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {r.examples.map((ex, i) => (
                <span key={i} style={{ background: "white", border: `1px solid ${border}`, borderRadius: 6, padding: "4px 10px", fontSize: 13 }}>
                  <strong style={{ color }}>{label}</strong> {ex.nl} <span style={{ color: "#94a3b8" }}>— {ex.en}</span>
                </span>
              ))}
            </div>
          </div>
        ))}
      </div>
    );
  }

  return (
    <div>
      <div style={{ background: "#fef9c3", border: "1.5px solid #fde047", borderRadius: 10, padding: 14, marginBottom: 20 }}>
        <strong>💡 Honest truth:</strong> Dutch articles are partly irregular. These rules cover the <em>most reliable patterns</em>, but the safest approach is to <strong>always learn the article with the word</strong>. When in doubt, «de» is more common (~75% of nouns).
      </div>
      <Section rules={hetRules} label="het" color="#0891b2" bg="#ecfeff" border="#a5f3fc" />
      <Section rules={deRules}  label="de"  color="#be185d" bg="#fdf2f8" border="#f9a8d4" />
    </div>
  );
}

function DeHetFlashcards() {
  const [queue, setQueue] = useState(() => shuffle(DEHET_WORDS));
  const [flipped, setFlipped] = useState(false);
  const [known, setKnown] = useState([]);
  const total = DEHET_WORDS.length;
  const pct = Math.round((known.length / total) * 100);
  const card = queue[0];
  const done = queue.length === 0;

  function next(verdict) {
    setFlipped(false);
    setQueue(q => {
      const [cur, ...rest] = q;
      if (verdict === "unsure") {
        const pos = Math.min(3, rest.length);
        return [...rest.slice(0, pos), cur, ...rest.slice(pos)];
      }
      setKnown(k => [...k, cur.nl]);
      return rest;
    });
  }
  function restart() { setQueue(shuffle(DEHET_WORDS)); setFlipped(false); setKnown([]); }

  if (done) return (
    <div style={{ textAlign: "center", padding: 40 }}>
      <Ring pct={100} size={80} color="#0891b2" />
      <h2 style={{ margin: "16px 0 8px", color: "#1e293b" }}>All {total} words done!</h2>
      <button onClick={restart} style={btnStyle("white", "#0891b2")}>↺ Restart</button>
    </div>
  );

  const artColor = card.article === "het" ? "#0891b2" : "#be185d";
  const artBg    = card.article === "het" ? "#ecfeff"  : "#fdf2f8";

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 16 }}>
        <Ring pct={pct} size={52} color="#0891b2" />
        <div style={{ flex: 1 }}>
          <div style={{ height: 7, background: "#e2e8f0", borderRadius: 4, overflow: "hidden" }}>
            <div style={{ width: `${pct}%`, height: "100%", background: "#0891b2", borderRadius: 4, transition: "width 0.4s" }} />
          </div>
          <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 3 }}>{known.length}/{total} mastered · {queue.length} left</div>
        </div>
      </div>

      <div onClick={() => setFlipped(f => !f)} style={{
        background: flipped ? artBg : "white",
        border: `2px solid ${flipped ? (card.article === "het" ? "#a5f3fc" : "#f9a8d4") : "#e2e8f0"}`,
        borderRadius: 14, padding: 28, minHeight: 180, cursor: "pointer",
        transition: "all 0.2s", marginBottom: 14,
        display: "flex", flexDirection: "column", justifyContent: "center",
      }}>
        {!flipped ? (
          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: 11, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1, marginBottom: 14 }}>Tap to reveal</div>
            <div style={{ fontSize: 28, fontWeight: "bold", color: "#1e293b", marginBottom: 6 }}>{card.nl}</div>
            <div style={{ fontSize: 13, color: "#64748b" }}>
              «<span style={{ color: "#0891b2", fontWeight: "bold" }}>het</span>» or «<span style={{ color: "#be185d", fontWeight: "bold" }}>de</span>»?
            </div>
          </div>
        ) : (
          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: 32, fontWeight: "bold", color: artColor, marginBottom: 6 }}>
              {card.article} {card.nl}
            </div>
            <div style={{ fontSize: 15, color: "#475569", marginBottom: 10 }}>🇬🇧 {card.en}</div>
            <div style={{ fontSize: 12, color: "#64748b", background: "white", borderRadius: 8, padding: "6px 12px", display: "inline-block" }}>
              💡 {card.tip}
            </div>
          </div>
        )}
      </div>

      {flipped ? (
        <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
          <button onClick={() => next("unsure")} style={{ ...btnStyle("#dc2626", "#fee2e2"), flex: 1, maxWidth: 180 }}>😕 Again soon</button>
          <button onClick={() => next("know")}   style={{ ...btnStyle("#0891b2", "#ecfeff"), flex: 1, maxWidth: 180 }}>✓ Got it!</button>
        </div>
      ) : (
        <div style={{ textAlign: "center", color: "#94a3b8", fontSize: 12 }}>👆 Tap to reveal</div>
      )}
    </div>
  );
}

function DeHetQuiz() {
  const [questions, setQuestions] = useState(null);
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const [answers, setAnswers] = useState([]);

  function start() {
    setQuestions(shuffle(DEHET_WORDS).slice(0, 20));
    setIdx(0); setSelected(null); setScore(0); setDone(false); setAnswers([]);
  }

  if (!questions) return (
    <div style={{ textAlign: "center", padding: 40 }}>
      <div style={{ fontSize: 48, marginBottom: 12 }}>🎯</div>
      <h2 style={{ color: "#1e293b", marginBottom: 8 }}>de or het?</h2>
      <p style={{ color: "#64748b", marginBottom: 24, fontSize: 13 }}>See a Dutch noun, pick «de» or «het». 20 words.</p>
      <button onClick={start} style={btnStyle("white", "#0891b2")}>Start →</button>
    </div>
  );

  if (done) {
    const pct = Math.round((score / questions.length) * 100);
    return (
      <div>
        <div style={{ textAlign: "center", marginBottom: 20 }}>
          <Ring pct={pct} size={72} color={pct >= 80 ? "#16a34a" : pct >= 60 ? "#ca8a04" : "#dc2626"} />
          <h2 style={{ margin: "10px 0 4px", color: "#1e293b" }}>{score}/{questions.length}</h2>
          <p style={{ color: "#64748b", fontSize: 13 }}>{pct >= 80 ? "Uitstekend! 🇳🇱" : pct >= 60 ? "Good effort!" : "Review the flashcards!"}</p>
        </div>
        {answers.map((a, i) => (
          <div key={i} style={{ display: "flex", gap: 8, padding: "8px 12px", borderRadius: 8, marginBottom: 6, background: a.correct ? "#f0fdf4" : "#fef2f2", border: `1px solid ${a.correct ? "#bbf7d0" : "#fecaca"}` }}>
            <span>{a.correct ? "✅" : "❌"}</span>
            <div style={{ fontSize: 13 }}>
              <span style={{ fontWeight: "bold", color: a.correct ? "#0891b2" : "#dc2626" }}>{a.q.article} </span>
              <span style={{ color: "#1e293b" }}>{a.q.nl}</span>
              <span style={{ color: "#94a3b8" }}> — {a.q.en}</span>
              {!a.correct && <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>💡 {a.q.tip}</div>}
            </div>
          </div>
        ))}
        <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 16 }}>
          <button onClick={() => setQuestions(null)} style={btnStyle("#475569", "#e2e8f0")}>← Back</button>
          <button onClick={start} style={btnStyle("white", "#0891b2")}>↺ Try again</button>
        </div>
      </div>
    );
  }

  const q = questions[idx];
  const isCorrect = selected && selected === q.article;

  function choose(opt) {
    if (selected) return;
    setSelected(opt);
    if (opt === q.article) setScore(s => s + 1);
    setAnswers(prev => [...prev, { q, chosen: opt, correct: opt === q.article }]);
  }
  function next() { setSelected(null); if (idx + 1 >= questions.length) setDone(true); else setIdx(i => i + 1); }

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
        <div style={{ flex: 1, height: 7, background: "#e2e8f0", borderRadius: 4, overflow: "hidden" }}>
          <div style={{ width: `${(idx / questions.length) * 100}%`, height: "100%", background: "#0891b2", borderRadius: 4, transition: "width 0.3s" }} />
        </div>
        <span style={{ fontSize: 12, color: "#64748b" }}>{idx + 1}/{questions.length} · 🏅{score}</span>
      </div>

      <div style={{ background: "white", border: "1.5px solid #e2e8f0", borderRadius: 12, padding: 28, marginBottom: 16, textAlign: "center" }}>
        <div style={{ fontSize: 11, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Which article?</div>
        <div style={{ fontSize: 28, fontWeight: "bold", color: "#1e293b", marginBottom: 6 }}>___ {q.nl}</div>
        <div style={{ fontSize: 14, color: "#94a3b8" }}>🇬🇧 {q.en}</div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
        {["de", "het"].map(opt => {
          const picked = !!selected, isThis = opt === q.article;
          let bg = "white", border = "#e2e8f0", color = "#1e293b";
          if (picked) {
            if (isThis) { bg = "#ecfeff"; border = "#0891b2"; color = "#0891b2"; }
            else if (opt === selected) { bg = "#fef2f2"; border = "#dc2626"; color = "#dc2626"; }
          }
          return (
            <button key={opt} onClick={() => choose(opt)} style={{
              padding: "18px", borderRadius: 10, border: `2px solid ${border}`,
              background: bg, color, fontSize: 22, fontWeight: "bold",
              cursor: picked ? "default" : "pointer", transition: "all 0.15s",
            }}>
              {opt}
            </button>
          );
        })}
      </div>

      {selected && (
        <div style={{ background: isCorrect ? "#f0fdf4" : "#fef2f2", border: `1.5px solid ${isCorrect ? "#86efac" : "#fca5a5"}`, borderRadius: 10, padding: 14, marginBottom: 14 }}>
          <div style={{ fontWeight: "bold", color: isCorrect ? "#16a34a" : "#dc2626", marginBottom: 6 }}>
            {isCorrect ? "✅ Correct!" : `❌ It's «${q.article} ${q.nl}»`}
          </div>
          <div style={{ fontSize: 12, color: "#64748b" }}>💡 {q.tip}</div>
        </div>
      )}
      {selected && <div style={{ textAlign: "center" }}><button onClick={next} style={btnStyle("white", "#0891b2")}>{idx + 1 < questions.length ? "Next →" : "See results"}</button></div>}
    </div>
  );
}

function DeHetExercise() {
  const [inputs, setInputs] = useState({});
  const [checked, setChecked] = useState(false);
  const [showHints, setShowHints] = useState({});
  const [score, setScore] = useState(null);

  function isCorrect(i) { return (inputs[i] || "").trim().toLowerCase() === DEHET_EXERCISES[i].answer.toLowerCase(); }
  function check() { setChecked(true); setScore(DEHET_EXERCISES.filter((_, i) => isCorrect(i)).length); }
  function reset() { setInputs({}); setChecked(false); setScore(null); setShowHints({}); }

  return (
    <div>
      <p style={{ color: "#475569", fontSize: 13, marginBottom: 14 }}>
        Fill in <strong style={{ color: "#0891b2" }}>het</strong> or <strong style={{ color: "#be185d" }}>de</strong> for each sentence.
      </p>
      {DEHET_EXERCISES.map((ex, i) => {
        const correct = checked && isCorrect(i), wrong = checked && !isCorrect(i);
        return (
          <div key={i} style={{ background: "white", border: checked ? `1.5px solid ${correct ? "#bbf7d0" : "#fecaca"}` : "1.5px solid #e2e8f0", borderRadius: 9, padding: "12px 16px", marginBottom: 8 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", lineHeight: 2 }}>
              <span style={{ color: "#94a3b8", fontSize: 11 }}>{i + 1}.</span>
              <input
                value={inputs[i] || ""}
                onChange={e => { setInputs(p => ({ ...p, [i]: e.target.value })); setChecked(false); setScore(null); }}
                placeholder="de/het"
                style={{ width: 55, padding: "4px 8px", borderRadius: 6, fontSize: 13, textAlign: "center", border: checked ? `2px solid ${correct ? "#16a34a" : "#dc2626"}` : "1.5px solid #cbd5e1", outline: "none" }}
                onKeyDown={e => e.key === "Enter" && check()}
              />
              <span style={{ color: "#1e293b", fontSize: 14 }}>{ex.sentence.replace("___", "").trim()}</span>
              {checked && <span style={{ fontSize: 16 }}>{correct ? "✅" : "❌"}</span>}
              {wrong && <span style={{ color: "#0891b2", fontWeight: "bold", fontSize: 12 }}>→ {ex.answer}</span>}
            </div>
            <div style={{ fontSize: 11, color: "#94a3b8", fontStyle: "italic", marginBottom: 4 }}>🇬🇧 {ex.en}</div>
            <div>
              <button onClick={() => setShowHints(h => ({ ...h, [i]: !h[i] }))} style={{ fontSize: 11, color: "#94a3b8", background: "none", border: "none", cursor: "pointer", padding: 0 }}>
                {showHints[i] ? "▲ hide hint" : "▼ hint"}
              </button>
              {showHints[i] && <span style={{ fontSize: 11, color: "#64748b", marginLeft: 6 }}>💡 {ex.hint}</span>}
            </div>
          </div>
        );
      })}
      {score !== null && (
        <div style={{ background: score === DEHET_EXERCISES.length ? "#f0fdf4" : score >= DEHET_EXERCISES.length * 0.7 ? "#fefce8" : "#fef2f2", border: `1.5px solid ${score === DEHET_EXERCISES.length ? "#86efac" : score >= DEHET_EXERCISES.length * 0.7 ? "#fde047" : "#fca5a5"}`, borderRadius: 10, padding: 14, textAlign: "center", marginBottom: 12, fontSize: 16 }}>
          {score === DEHET_EXERCISES.length ? "🎉 Perfect!" : score >= DEHET_EXERCISES.length * 0.7 ? "👍 Goed!" : "📚 Review the rules!"}
          {" "}<strong>{score}/{DEHET_EXERCISES.length}</strong>
        </div>
      )}
      <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 8 }}>
        <button onClick={check} style={btnStyle("white", "#0891b2")}>✓ Check</button>
        <button onClick={reset} style={btnStyle("#475569", "#e2e8f0")}>↺ Reset</button>
      </div>
    </div>
  );
}

function DieDatRules() {
  const tagBg = { relative:"#eff6ff", demonstrative:"#f0fdf4", conjunction:"#fef9c3", "het plural → die":"#fdf4ff", "de plural → die":"#fdf4ff", "iets → wat":"#fff7ed", "alles → wat":"#fff7ed", "sentence ref → wat":"#fff7ed", "relative plural":"#eff6ff" };
  const tagColor = { relative:"#2563eb", demonstrative:"#16a34a", conjunction:"#92400e", "het plural → die":"#7c3aed", "de plural → die":"#7c3aed", "iets → wat":"#c2410c", "alles → wat":"#c2410c", "sentence ref → wat":"#c2410c", "relative plural":"#2563eb" };

  return (
    <div>
      <div style={{ background: "#fef9c3", border: "1.5px solid #fde047", borderRadius: 10, padding: 14, marginBottom: 20, fontSize: 13 }}>
        <strong>💡 Quick decision tree:</strong><br/>
        Is the antecedent a <strong>de-word</strong>? → <strong style={{ color: "#7c3aed" }}>die</strong><br/>
        Is the antecedent a <strong>het-word</strong> (singular)? → <strong style={{ color: "#0891b2" }}>dat</strong><br/>
        Is it <strong>plural</strong>? → always <strong style={{ color: "#7c3aed" }}>die</strong><br/>
        Is it <strong>iets / niets / alles / veel</strong> or a <strong>whole sentence</strong>? → <strong style={{ color: "#c2410c" }}>wat</strong><br/>
        Is it a <strong>conjunction</strong> (= "that")? → <strong style={{ color: "#0891b2" }}>dat</strong>
      </div>

      {DIEDAT_RULES.map(r => (
        <div key={r.id} style={{ background: "white", border: "1.5px solid #e2e8f0", borderRadius: 10, padding: 16, marginBottom: 14 }}>
          <div style={{ fontWeight: "bold", color: "#1e293b", fontSize: 15, marginBottom: 6 }}>{r.title}</div>
          <div style={{ color: "#475569", fontSize: 13, marginBottom: 12 }}>{r.explanation}</div>
          {r.examples.map((ex, i) => (
            <div key={i} style={{ marginBottom: 8, paddingLeft: 10, borderLeft: "3px solid #e2e8f0" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                <span style={{ fontStyle: "italic", color: "#1e293b", fontSize: 14 }}>{ex.nl}</span>
                <span style={{ padding: "1px 7px", borderRadius: 10, fontSize: 10, fontWeight: "bold", background: tagBg[ex.tag] || "#f1f5f9", color: tagColor[ex.tag] || "#475569" }}>{ex.tag}</span>
              </div>
              <div style={{ fontSize: 12, color: "#94a3b8" }}>— {ex.en}</div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

function DieDatQuiz() {
  const [questions, setQuestions] = useState(null);
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const [answers, setAnswers] = useState([]);

  function start() {
    setQuestions(shuffle(DIEDAT_QUIZ));
    setIdx(0); setSelected(null); setScore(0); setDone(false); setAnswers([]);
  }

  if (!questions) return (
    <div style={{ textAlign: "center", padding: 40 }}>
      <div style={{ fontSize: 48, marginBottom: 12 }}>🎯</div>
      <h2 style={{ color: "#1e293b", marginBottom: 8 }}>die, dat or wat?</h2>
      <p style={{ color: "#64748b", marginBottom: 24, fontSize: 13 }}>Pick the correct relative pronoun. {DIEDAT_QUIZ.length} questions.</p>
      <button onClick={start} style={btnStyle("white", "#ea580c")}>Start →</button>
    </div>
  );

  if (done) {
    const pct = Math.round((score / questions.length) * 100);
    return (
      <div>
        <div style={{ textAlign: "center", marginBottom: 20 }}>
          <Ring pct={pct} size={72} color={pct >= 80 ? "#16a34a" : pct >= 60 ? "#ca8a04" : "#dc2626"} />
          <h2 style={{ margin: "10px 0 4px", color: "#1e293b" }}>{score}/{questions.length}</h2>
          <p style={{ color: "#64748b", fontSize: 13 }}>{pct >= 80 ? "Uitstekend! 🇳🇱" : pct >= 60 ? "Good effort!" : "Review the rules!"}</p>
        </div>
        {answers.map((a, i) => (
          <div key={i} style={{ display: "flex", gap: 8, padding: "8px 12px", borderRadius: 8, marginBottom: 6, background: a.correct ? "#f0fdf4" : "#fef2f2", border: `1px solid ${a.correct ? "#bbf7d0" : "#fecaca"}` }}>
            <span>{a.correct ? "✅" : "❌"}</span>
            <div style={{ fontSize: 13 }}>
              <div style={{ fontStyle: "italic", color: "#1e293b" }}>{a.q.sentence.replace("___", `«${a.q.answer}»`)}</div>
              {!a.correct && <div style={{ color: "#dc2626", fontSize: 12 }}>You: <b>{a.chosen}</b> · Correct: <b style={{ color: "#16a34a" }}>{a.q.answer}</b></div>}
            </div>
          </div>
        ))}
        <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 16 }}>
          <button onClick={() => setQuestions(null)} style={btnStyle("#475569", "#e2e8f0")}>← Back</button>
          <button onClick={start} style={btnStyle("white", "#ea580c")}>↺ Try again</button>
        </div>
      </div>
    );
  }

  const q = questions[idx];
  const isCorrect = selected && selected.toLowerCase() === q.answer.toLowerCase();

  function choose(opt) {
    if (selected) return;
    setSelected(opt);
    if (opt.toLowerCase() === q.answer.toLowerCase()) setScore(s => s + 1);
    setAnswers(prev => [...prev, { q, chosen: opt, correct: opt.toLowerCase() === q.answer.toLowerCase() }]);
  }
  function next() { setSelected(null); if (idx + 1 >= questions.length) setDone(true); else setIdx(i => i + 1); }

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
        <div style={{ flex: 1, height: 7, background: "#e2e8f0", borderRadius: 4, overflow: "hidden" }}>
          <div style={{ width: `${(idx / questions.length) * 100}%`, height: "100%", background: "#ea580c", borderRadius: 4, transition: "width 0.3s" }} />
        </div>
        <span style={{ fontSize: 12, color: "#64748b" }}>{idx + 1}/{questions.length} · 🏅{score}</span>
      </div>

      <div style={{ background: "white", border: "1.5px solid #e2e8f0", borderRadius: 12, padding: 24, marginBottom: 16 }}>
        <div style={{ fontSize: 11, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Fill in the blank</div>
        <div style={{ fontSize: 19, color: "#1e293b", fontStyle: "italic", marginBottom: 6 }}>{q.sentence}</div>
        <div style={{ fontSize: 13, color: "#94a3b8" }}>🇬🇧 {q.en}</div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 16 }}>
        {q.options.map(opt => {
          const picked = !!selected, isThis = opt.toLowerCase() === q.answer.toLowerCase();
          let bg = "white", border = "#e2e8f0", color = "#1e293b";
          if (picked) {
            if (isThis) { bg = "#f0fdf4"; border = "#16a34a"; color = "#16a34a"; }
            else if (opt === selected) { bg = "#fef2f2"; border = "#dc2626"; color = "#dc2626"; }
          }
          return (
            <button key={opt} onClick={() => choose(opt)} style={{ padding: "14px 6px", borderRadius: 9, border: `2px solid ${border}`, background: bg, color, fontSize: 16, fontWeight: "bold", cursor: picked ? "default" : "pointer", transition: "all 0.15s" }}>
              {opt}
            </button>
          );
        })}
      </div>

      {selected && (
        <div style={{ background: isCorrect ? "#f0fdf4" : "#fef2f2", border: `1.5px solid ${isCorrect ? "#86efac" : "#fca5a5"}`, borderRadius: 10, padding: 14, marginBottom: 14 }}>
          <div style={{ fontWeight: "bold", color: isCorrect ? "#16a34a" : "#dc2626", marginBottom: 6 }}>
            {isCorrect ? "✅ Correct!" : `❌ Answer: «${q.answer}»`}
          </div>
          <div style={{ fontStyle: "italic", color: "#7c3aed", fontSize: 14 }}>{q.sentence.replace("___", `«${q.answer}»`)}</div>
        </div>
      )}
      {selected && <div style={{ textAlign: "center" }}><button onClick={next} style={btnStyle("white", "#ea580c")}>{idx + 1 < questions.length ? "Next →" : "See results"}</button></div>}
    </div>
  );
}

function DieDatExercise() {
  const [inputs, setInputs] = useState({});
  const [checked, setChecked] = useState(false);
  const [showHints, setShowHints] = useState({});
  const [score, setScore] = useState(null);

  function isCorrect(i) { return (inputs[i] || "").trim().toLowerCase() === DIEDAT_EXERCISES[i].answer.toLowerCase(); }
  function check() { setChecked(true); setScore(DIEDAT_EXERCISES.filter((_, i) => isCorrect(i)).length); }
  function reset() { setInputs({}); setChecked(false); setScore(null); setShowHints({}); }

  return (
    <div>
      <p style={{ color: "#475569", fontSize: 13, marginBottom: 14 }}>
        Fill in <strong style={{ color: "#7c3aed" }}>die</strong>, <strong style={{ color: "#0891b2" }}>dat</strong>, or <strong style={{ color: "#c2410c" }}>wat</strong>.
      </p>
      {DIEDAT_EXERCISES.map((ex, i) => {
        const correct = checked && isCorrect(i), wrong = checked && !isCorrect(i);
        return (
          <div key={i} style={{ background: "white", border: checked ? `1.5px solid ${correct ? "#bbf7d0" : "#fecaca"}` : "1.5px solid #e2e8f0", borderRadius: 9, padding: "12px 16px", marginBottom: 8 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", lineHeight: 2, marginBottom: 2 }}>
              <span style={{ color: "#94a3b8", fontSize: 11 }}>{i + 1}.</span>
              <span style={{ fontSize: 14, color: "#1e293b" }}>{ex.sentence.split("___")[0]}</span>
              <input
                value={inputs[i] || ""}
                onChange={e => { setInputs(p => ({ ...p, [i]: e.target.value })); setChecked(false); setScore(null); }}
                placeholder="die/dat/wat"
                style={{ width: 72, padding: "4px 8px", borderRadius: 6, fontSize: 13, textAlign: "center", border: checked ? `2px solid ${correct ? "#16a34a" : "#dc2626"}` : "1.5px solid #cbd5e1", outline: "none" }}
                onKeyDown={e => e.key === "Enter" && check()}
              />
              <span style={{ fontSize: 14, color: "#1e293b" }}>{ex.sentence.split("___")[1]}</span>
              {checked && <span style={{ fontSize: 16 }}>{correct ? "✅" : "❌"}</span>}
              {wrong && <span style={{ color: "#16a34a", fontWeight: "bold", fontSize: 12 }}>→ {ex.answer}</span>}
            </div>
            <div style={{ fontSize: 11, color: "#94a3b8", fontStyle: "italic", marginBottom: 4 }}>🇬🇧 {ex.en}</div>
            <div>
              <button onClick={() => setShowHints(h => ({ ...h, [i]: !h[i] }))} style={{ fontSize: 11, color: "#94a3b8", background: "none", border: "none", cursor: "pointer", padding: 0 }}>
                {showHints[i] ? "▲ hide hint" : "▼ hint"}
              </button>
              {showHints[i] && <span style={{ fontSize: 11, color: "#64748b", marginLeft: 6 }}>💡 {ex.hint}</span>}
            </div>
          </div>
        );
      })}
      {score !== null && (
        <div style={{ background: score === DIEDAT_EXERCISES.length ? "#f0fdf4" : score >= DIEDAT_EXERCISES.length * 0.7 ? "#fefce8" : "#fef2f2", border: `1.5px solid ${score === DIEDAT_EXERCISES.length ? "#86efac" : score >= DIEDAT_EXERCISES.length * 0.7 ? "#fde047" : "#fca5a5"}`, borderRadius: 10, padding: 14, textAlign: "center", marginBottom: 12, fontSize: 16 }}>
          {score === DIEDAT_EXERCISES.length ? "🎉 Perfect!" : score >= DIEDAT_EXERCISES.length * 0.7 ? "👍 Goed!" : "📚 Review the rules!"}
          {" "}<strong>{score}/{DIEDAT_EXERCISES.length}</strong>
        </div>
      )}
      <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 8 }}>
        <button onClick={check} style={btnStyle("white", "#ea580c")}>✓ Check</button>
        <button onClick={reset} style={btnStyle("#475569", "#e2e8f0")}>↺ Reset</button>
      </div>
    </div>
  );
