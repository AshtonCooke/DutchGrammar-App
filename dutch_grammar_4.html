            { id:"quiz",    icon:"⚡", label:"Quiz",           desc:"Dutch word → pick English (4 options)" },
            { id:"rquiz",   icon:"🎯", label:"Reverse Quiz",   desc:"English meaning → pick Dutch word (4 options)" },
            { id:"list",    icon:"📋", label:"Word List",      desc:"Browse, search & filter all words" },
          ].map(m => (
            <button key={m.id} onClick={() => setMode(m.id)} style={{ background:"white", border:"1.5px solid #e2e8f0", borderRadius:10, padding:"14px 18px", cursor:"pointer", textAlign:"left" }}>
              <div style={{ fontWeight:"bold", fontSize:15 }}>{m.icon} {m.label}</div>
              <div style={{ fontSize:12, color:"#94a3b8", marginTop:2 }}>{m.desc}</div>
            </button>
          ))}
        </div>
      </div>
    );
  }

  const words = FREQ_WORDS.filter(tierMeta[tier].filter);
  const t = tierMeta[tier];
  const back = () => setMode(null);

  if (mode === "list")    return <VocabList    words={words} tier={t} onBack={back} />;
  if (mode === "flash")   return <VocabFlash   words={words} tier={t} onBack={back} reverse={false} />;
  if (mode === "reverse") return <VocabFlash   words={words} tier={t} onBack={back} reverse={true} />;
  if (mode === "quiz")    return <VocabQuiz    words={words} tier={t} onBack={back} reverse={false} />;
  if (mode === "rquiz")   return <VocabQuiz    words={words} tier={t} onBack={back} reverse={true} />;
  return null;
}

function VocabList({ words, tier, onBack }) {
  const [search, setSearch] = useState("");
  const [filter, setFilter] = useState("all");
  const [showEn, setShowEn] = useState(true);
  const types = ["all", ...Array.from(new Set(words.map(w => w.type))).sort()];
  const typeLabels = { all:"All", art:"Article", pron:"Pronoun", verb:"Verb", prep:"Preposition", conj:"Conjunction", adv:"Adverb", adj:"Adjective", noun:"Noun", num:"Numeral", part:"Particle" };

  const shown = words.filter(w => {
    const matchType = filter === "all" || w.type === filter;
    const q = search.toLowerCase();
    const matchSearch = !q || w.nl.toLowerCase().includes(q) || w.en.toLowerCase().includes(q);
    return matchType && matchSearch;
  });

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
        <button onClick={onBack} style={{ background:"none", border:"none", cursor:"pointer", color:"#94a3b8", fontSize:13, padding:0 }}>← Back</button>
        <div style={{ flex:1 }} />
        <button onClick={() => setShowEn(e => !e)} style={{ fontSize:11, padding:"4px 10px", borderRadius:20, border:`1.5px solid ${tier.color}`, background: showEn ? tier.bg : "white", color: tier.color, cursor:"pointer", fontWeight:"bold" }}>
          {showEn ? "🇬🇧 Hide EN" : "🇬🇧 Show EN"}
        </button>
      </div>
      <div style={{ marginBottom:12 }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Search Dutch or English..."
          style={{ width:"100%", padding:"10px 14px", borderRadius:8, border:"1.5px solid #e2e8f0", fontSize:14, boxSizing:"border-box", outline:"none" }} />
      </div>
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:14 }}>
        {types.map(tp => (
          <button key={tp} onClick={() => setFilter(tp)} style={{
            padding:"4px 10px", borderRadius:20, fontSize:11, fontWeight:"bold", cursor:"pointer",
            border:`1.5px solid ${filter===tp ? tier.color : "#e2e8f0"}`,
            background: filter===tp ? tier.bg : "white", color: filter===tp ? tier.color : "#64748b"
          }}>{typeLabels[tp] || tp}</button>
        ))}
      </div>
      <div style={{ fontSize:12, color:"#94a3b8", marginBottom:10 }}>{shown.length} words</div>
      <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
        {shown.slice(0,300).map(w => (
          <div key={w.rank} style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 12px", background:"white", borderRadius:8, border:"1px solid #f1f5f9" }}>
            <span style={{ fontSize:11, color:"#cbd5e1", width:36, flexShrink:0 }}>#{w.rank}</span>
            <span style={{ fontWeight:"bold", color:"#1e293b", flex:1 }}>{w.nl}</span>
            {showEn && <span style={{ color:"#64748b", fontSize:13, flex:2 }}>{w.en}</span>}
            <span style={{ fontSize:10, color:"white", background:tier.color, borderRadius:10, padding:"1px 6px", flexShrink:0 }}>{w.type}</span>
          </div>
        ))}
        {shown.length > 300 && <div style={{ textAlign:"center", color:"#94a3b8", fontSize:12, padding:8 }}>Showing first 300 — search to narrow results</div>}
      </div>
    </div>
  );
}

// ProgressBar shown at top of flashcard/quiz sessions — resettable
function VocabProgress({ known, total, streak, color, onReset }) {
  const pct = total > 0 ? Math.round((known / total) * 100) : 0;
  return (
    <div style={{ marginBottom:16 }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:6 }}>
        <Ring pct={pct} size={44} color={color} />
        <div style={{ flex:1 }}>
          <div style={{ height:8, background:"#e2e8f0", borderRadius:4, overflow:"hidden" }}>
            <div style={{ width:`${pct}%`, height:"100%", background:color, borderRadius:4, transition:"width 0.4s" }} />
          </div>
          <div style={{ display:"flex", justifyContent:"space-between", marginTop:3 }}>
            <span style={{ fontSize:11, color:"#94a3b8" }}>{known}/{total} done · {total - known} left</span>
            <span style={{ fontSize:11, color: streak >= 5 ? "#f59e0b" : "#94a3b8" }}>
              {streak >= 3 ? `🔥 ${streak} streak` : `streak: ${streak}`}
            </span>
          </div>
        </div>
        <button onClick={onReset} title="Reset progress" style={{ fontSize:16, background:"none", border:"none", cursor:"pointer", color:"#cbd5e1", padding:"2px 4px", lineHeight:1 }}>↺</button>
      </div>
    </div>
  );
}

function VocabFlash({ words, tier, onBack, reverse }) {
  const [queue, setQueue]   = useState(() => shuffle([...words]));
  const [flipped, setFlipped] = useState(false);
  const [known, setKnown]   = useState(0);
  const [streak, setStreak] = useState(0);
  const total = words.length;
  const card  = queue[0];
  const done  = queue.length === 0;

  const typeLabels = { art:"article", pron:"pronoun", verb:"verb", prep:"preposition", conj:"conjunction", adv:"adverb", adj:"adjective", noun:"noun", num:"numeral", part:"particle" };

  function doReset() { setQueue(shuffle([...words])); setFlipped(false); setKnown(0); setStreak(0); }

  function next(verdict) {
    setFlipped(false);
    if (verdict === "know") {
      setKnown(k => k + 1);
      setStreak(s => s + 1);
      setQueue(q => q.slice(1));
    } else {
      setStreak(0);
      setQueue(q => {
        const [cur, ...rest] = q;
        const pos = Math.min(3, rest.length);
        return [...rest.slice(0,pos), cur, ...rest.slice(pos)];
      });
    }
  }

  if (done) return (
    <div style={{ textAlign:"center", padding:40 }}>
      <Ring pct={100} size={80} color={tier.color} />
      <div style={{ fontSize:36, margin:"12px 0 4px" }}>🎉</div>
      <h2 style={{ color:"#1e293b", marginBottom:4 }}>All {total} words done!</h2>
      <p style={{ color:"#64748b", fontSize:13, marginBottom:20 }}>Best streak: {streak} 🔥</p>
      <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
        <button onClick={onBack} style={btnStyle("#475569","#e2e8f0")}>← Back</button>
        <button onClick={doReset} style={{ padding:"10px 24px", background:tier.color, color:"white", border:"none", borderRadius:8, fontSize:14, cursor:"pointer", fontWeight:"bold" }}>↺ Again</button>
      </div>
    </div>
  );

  const front = reverse ? card.en : card.nl;
  const back  = reverse ? card.nl : card.en;
  const frontLabel = reverse ? "🇬🇧 English" : "🇳🇱 Dutch";
  const backLabel  = reverse ? "🇳🇱 Dutch" : "🇬🇧 English";

  return (
    <div>
      <button onClick={onBack} style={{ background:"none", border:"none", cursor:"pointer", color:"#94a3b8", fontSize:13, marginBottom:10, padding:0 }}>← Back</button>
      <VocabProgress known={known} total={total} streak={streak} color={tier.color} onReset={doReset} />

      <div onClick={() => setFlipped(f => !f)} style={{
        background: flipped ? tier.bg : "white",
        border:`2px solid ${flipped ? tier.border : "#e2e8f0"}`,
        borderRadius:14, padding:28, minHeight:180, cursor:"pointer",
        transition:"all 0.2s", marginBottom:14,
        display:"flex", flexDirection:"column", justifyContent:"center", alignItems:"center"
      }}>
        {!flipped ? (
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:10, color:"#94a3b8", textTransform:"uppercase", letterSpacing:1, marginBottom:14 }}>{frontLabel} · tap to reveal</div>
            <div style={{ fontSize:30, fontWeight:"bold", color:"#1e293b", marginBottom:6 }}>{front}</div>
            <div style={{ fontSize:11, color:"#cbd5e1" }}>#{card.rank} · {typeLabels[card.type] || card.type}</div>
          </div>
        ) : (
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:10, color:tier.color, textTransform:"uppercase", letterSpacing:1, marginBottom:10 }}>{backLabel} · #{card.rank}</div>
            <div style={{ fontSize:26, fontWeight:"bold", color:"#1e293b", marginBottom:6 }}>{back}</div>
            <div style={{ fontSize:13, color:"#64748b", marginBottom:6 }}>{front}</div>
            <div style={{ fontSize:11, color:"#94a3b8", background:"white", borderRadius:8, padding:"3px 10px", display:"inline-block" }}>{typeLabels[card.type] || card.type}</div>
          </div>
        )}
      </div>

      {flipped ? (
        <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
          <button onClick={() => next("unsure")} style={{ padding:"12px 20px", background:"#fee2e2", color:"#dc2626", border:"none", borderRadius:8, fontSize:14, cursor:"pointer", fontWeight:"bold", flex:1, maxWidth:180 }}>😕 Again</button>
          <button onClick={() => next("know")}   style={{ padding:"12px 20px", background:tier.bg, color:tier.color, border:"none", borderRadius:8, fontSize:14, cursor:"pointer", fontWeight:"bold", flex:1, maxWidth:180 }}>✓ Got it</button>
        </div>
      ) : (
        <div style={{ textAlign:"center", color:"#94a3b8", fontSize:12 }}>👆 Tap to reveal</div>
      )}
    </div>
  );
}

function VocabQuiz({ words, tier, onBack, reverse }) {
  const [questions, setQuestions] = useState(null);
  const [idx,      setIdx]       = useState(0);
  const [selected, setSelected]  = useState(null);
  const [score,    setScore]     = useState(0);
  const [streak,   setStreak]    = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [done,     setDone]      = useState(false);
  const [answers,  setAnswers]   = useState([]);
  const TOTAL = 20;

  function start() {
    const qs = shuffle([...words]).slice(0, TOTAL).map(q => {
      // For reverse: show English, pick Dutch
      const pool = words.filter(w => w.nl !== q.nl);
      const distractors = shuffle(pool).slice(0, 3).map(w => reverse ? w.nl : w.en);
      const correct = reverse ? q.nl : q.en;
      const opts = shuffle([correct, ...distractors]);
      return { q, opts, correct };
    });
    setQuestions(qs); setIdx(0); setSelected(null); setScore(0); setStreak(0); setBestStreak(0); setDone(false); setAnswers([]);
  }

  if (!questions) return (
    <div style={{ textAlign:"center", padding:40 }}>
      <div style={{ fontSize:48, marginBottom:12 }}>{reverse ? "🎯" : "⚡"}</div>
      <h2 style={{ color:"#1e293b", marginBottom:8 }}>{tier.label} {reverse ? "Reverse Quiz" : "Quiz"}</h2>
      <p style={{ color:"#64748b", fontSize:13, marginBottom:6 }}>
        {reverse ? "See English → pick the Dutch word." : "See Dutch → pick the English meaning."}
      </p>
      <p style={{ color:"#94a3b8", fontSize:12, marginBottom:24 }}>{TOTAL} questions per round.</p>
      <button onClick={start} style={{ padding:"12px 28px", background:tier.color, color:"white", border:"none", borderRadius:8, fontSize:14, cursor:"pointer", fontWeight:"bold" }}>Start →</button>
    </div>
  );

  if (done) {
    const pct = Math.round((score / TOTAL) * 100);
    return (
      <div>
        <div style={{ textAlign:"center", marginBottom:20 }}>
          <Ring pct={pct} size={72} color={pct >= 80 ? "#16a34a" : pct >= 60 ? "#ca8a04" : "#dc2626"} />
          <h2 style={{ margin:"10px 0 4px" }}>{score}/{TOTAL}</h2>
          <div style={{ color:"#f59e0b", fontSize:13, marginBottom:4 }}>🔥 Best streak: {bestStreak}</div>
          <p style={{ color:"#64748b", fontSize:13 }}>{pct >= 80 ? "Uitstekend! 🇳🇱" : pct >= 60 ? "Goed gedaan!" : "Keep practising!"}</p>
        </div>
        <div style={{ maxHeight:320, overflowY:"auto" }}>
          {answers.map((a, i) => (
            <div key={i} style={{ display:"flex", gap:8, padding:"8px 12px", borderRadius:8, marginBottom:6, background: a.correct ? "#f0fdf4" : "#fef2f2", border:`1px solid ${a.correct ? "#bbf7d0" : "#fecaca"}` }}>
              <span>{a.correct ? "✅" : "❌"}</span>
              <div style={{ fontSize:13 }}>
                <strong>{a.q.nl}</strong> — {a.q.en}
                {!a.correct && <div style={{ color:"#dc2626", fontSize:11 }}>You chose: {a.chosen}</div>}
              </div>
            </div>
          ))}
        </div>
        <div style={{ display:"flex", gap:10, justifyContent:"center", marginTop:16 }}>
          <button onClick={onBack}  style={btnStyle("#475569","#e2e8f0")}>← Back</button>
          <button onClick={start}   style={{ padding:"10px 24px", background:tier.color, color:"white", border:"none", borderRadius:8, fontSize:14, cursor:"pointer", fontWeight:"bold" }}>↺ Again</button>
        </div>
      </div>
    );
  }

  const { q, opts, correct } = questions[idx];
  const isCorrect = selected === correct;

  function choose(opt) {
    if (selected) return;
    setSelected(opt);
    const correct_ = opt === correct;
    if (correct_) {
      setScore(s => s + 1);
      setStreak(s => {
        const ns = s + 1;
        setBestStreak(b => Math.max(b, ns));
        return ns;
      });
    } else {
      setStreak(0);
    }
    setAnswers(prev => [...prev, { q, chosen: opt, correct: correct_ }]);
  }
  function next() { setSelected(null); if (idx + 1 >= TOTAL) setDone(true); else setIdx(i => i + 1); }

  // Progress bar across top
  const qPct = Math.round((idx / TOTAL) * 100);

  return (
    <div>
      <button onClick={onBack} style={{ background:"none", border:"none", cursor:"pointer", color:"#94a3b8", fontSize:13, marginBottom:10, padding:0 }}>← Back</button>
      <div style={{ marginBottom:14 }}>
        <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#94a3b8", marginBottom:4 }}>
          <span>{idx+1}/{TOTAL}</span>
          <span>🏅 {score} · {streak >= 3 ? `🔥 ${streak}` : `streak ${streak}`}</span>
        </div>
        <div style={{ height:8, background:"#e2e8f0", borderRadius:4, overflow:"hidden" }}>
          <div style={{ width:`${qPct}%`, height:"100%", background:tier.color, borderRadius:4, transition:"width 0.3s" }} />
        </div>
      </div>

      <div style={{ background:"white", border:"1.5px solid #e2e8f0", borderRadius:12, padding:24, marginBottom:16, textAlign:"center" }}>
        <div style={{ fontSize:10, color:"#94a3b8", textTransform:"uppercase", letterSpacing:1, marginBottom:12 }}>
          {reverse ? "What is the Dutch word for…" : "What does this mean?"}
        </div>
        <div style={{ fontSize:28, fontWeight:"bold", color:"#1e293b", marginBottom:4 }}>
          {reverse ? q.en : q.nl}
        </div>
        <div style={{ fontSize:11, color:"#cbd5e1" }}>#{q.rank} · {q.type}</div>
      </div>

      <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:14 }}>
        {opts.map(opt => {
          const picked = !!selected, isThis = opt === correct;
          let bg = "white", border_ = "#e2e8f0", col = "#1e293b";
          if (picked) {
            if (isThis)         { bg = tier.bg; border_ = tier.color; col = tier.color; }
            else if (opt === selected) { bg = "#fef2f2"; border_ = "#dc2626"; col = "#dc2626"; }
          }
          return (
            <button key={opt} onClick={() => choose(opt)} style={{
              padding:"12px 16px", borderRadius:9, border:`2px solid ${border_}`,
              background:bg, color:col, fontSize:14, textAlign:"left",
              cursor: picked ? "default" : "pointer", transition:"all 0.15s"
            }}>{opt}</button>
          );
        })}
      </div>

      {selected && (
        <div style={{ background: isCorrect ? "#f0fdf4" : "#fef2f2", border:`1.5px solid ${isCorrect ? "#86efac" : "#fca5a5"}`, borderRadius:10, padding:12, marginBottom:12 }}>
          <strong style={{ color: isCorrect ? "#16a34a" : "#dc2626" }}>
            {isCorrect ? "✅ Correct!" : `❌ ${correct}`}
          </strong>
          {!isCorrect && <div style={{ fontSize:12, color:"#64748b", marginTop:2 }}>{q.nl} = {q.en}</div>}
        </div>
      )}
      {selected && (
        <div style={{ textAlign:"center" }}>
          <button onClick={next} style={{ padding:"10px 24px", background:tier.color, color:"white", border:"none", borderRadius:8, fontSize:14, cursor:"pointer", fontWeight:"bold" }}>
            {idx+1 < TOTAL ? "Next →" : "See results"}
          </button>
        </div>
      )}
    </div>
  );
}

// Present tense conjugation helper
function conjugatePresent(v) {
  const s = v.stem;
  // For modals/irregulars that have their own stem = present ik form
  const irregPres = { zijn:["ben","bent","is","zijn","zijn","zijn"], hebben:["heb","hebt","heeft","hebben","hebben","hebben"], worden:["word","wordt","wordt","worden","worden","worden"], kunnen:["kan","kunt","kan","kunnen","kunnen","kunnen"], willen:["wil","wilt","wil","willen","willen","willen"], mogen:["mag","mag","mag","mogen","mogen","mogen"], moeten:["moet","moet","moet","moeten","moeten","moeten"], zullen:["zal","zult","zal","zullen","zullen","zullen"], weten:["weet","weet","weet","weten","weten","weten"], doen:["doe","doet","doet","doen","doen","doen"], gaan:["ga","gaat","gaat","gaan","gaan","gaan"], staan:["sta","staat","staat","staan","staan","staan"] };
  if (irregPres[v.inf]) return irregPres[v.inf];
  // Regular: stem, stem+t (unless ends in t), stem+t, inf, inf, inf
  const ik = s;
  const t_form = s.endsWith('t') ? s : s + 't';
  return [ik, t_form, t_form, v.inf.replace(/en$/,'en'), v.inf.replace(/en$/,'en'), v.inf.replace(/en$/,'en')];
}

function ConjugationGuide() {
  const [tab, setTab] = useState('present');
  const color = "#be185d";
  const bg = "#fdf2f8";
  const border = "#fbcfe8";

  const rules = {
    present: [
      { title:"The stem (stam)", body:"Remove -en from the infinitive: werken → werk, lopen → loop, rijden → rijd. If the stem ends in a double vowel before a consonant, shorten it: lopen → loop → loop (stays)." },
      { title:"ik (I)", body:"Just the bare stem: ik werk, ik loop, ik rijd. Exception: if you put the verb before 'ik' (inversion), NO -t is added — 'Werk jij?' but 'Werk ik?'" },
      { title:"jij/jij (you), hij/zij/het (he/she/it)", body:"Stem + -t: jij werkt, hij loopt. Exception: if stem already ends in -t, don't double it: hij zit (not zitt)." },
      { title:"wij/jullie/zij (we/you pl/they)", body:"Use the full infinitive form: wij werken, jullie lopen, zij rijden." },
      { title:"The t-rule trap", body:"Whether a stem gets -t depends on 't kofschip rule: if the last letter of the stem is in 't k o f s c h i p', the past tense uses -te/-ten. Otherwise -de/-den." },
    ],
    past: [
      { title:"Weak verbs (regelmatige werkwoorden)", body:"Add -te (singular) / -ten (plural) if stem ends in t k o f s c h p. Otherwise -de / -den. Example: werken → hij werkte, zij werkten. Leven → hij leefde, zij leefden." },
      { title:"Strong verbs (sterke werkwoorden)", body:"Change the vowel in the stem (ablaut). These must be memorised: rijden → reed, schrijven → schreef, lopen → liep, vinden → vond." },
      { title:"Mixed/irregular verbs", body:"A handful change stem AND use weak endings: denken → dacht, brengen → bracht, kopen → kocht, zeggen → zei." },
      { title:"Separable verbs in past tense", body:"The prefix rejoins in the past: opbellen → hij belde op (present) → hij belde op ✓. With ge- prefix in past participle: opgebeld." },
    ],
    pp: [
      { title:"Past participle formation", body:"ge- + stem + -d or -t (weak verbs). Which ending? Same 't kofschip rule: stem ends in t k o f s c h p → -t. Otherwise -d. Example: werken → gewerkt. Leven → geleefd." },
      { title:"Strong verbs — ge- + changed stem + -en", body:"schrijven → geschreven, lopen → gelopen, rijden → gereden, vinden → gevonden." },
      { title:"Separable verbs", body:"ge- goes between prefix and stem: opbellen → opgebeld, aankomen → aangekomen." },
      { title:"Verbs with inseparable prefixes (be-, ge-, er-, her-, ont-, ver-)", body:"No ge- added: bezoeken → bezocht, vertellen → verteld, ontvangen → ontvangen." },
    ],
  };

  return (
    <div>
      <div style={{ display:"flex", gap:8, marginBottom:20 }}>
        {[['present','Present tense'],['past','Past tense'],['pp','Past participle']].map(([id,label]) => (
          <button key={id} onClick={() => setTab(id)} style={{ flex:1, padding:"9px 4px", borderRadius:8, border:`2px solid ${tab===id ? color : "#e2e8f0"}`, background: tab===id ? bg : "white", color: tab===id ? color : "#64748b", fontSize:12, fontWeight:"bold", cursor:"pointer" }}>{label}</button>
        ))}
      </div>
      {rules[tab].map((r,i) => (
        <div key={i} style={{ marginBottom:14, padding:"14px 16px", background:"white", borderRadius:10, border:"1.5px solid #f1f5f9" }}>
          <div style={{ fontWeight:"bold", color, marginBottom:6, fontSize:14 }}>{r.title}</div>
          <div style={{ color:"#475569", fontSize:13, lineHeight:1.6 }}>{r.body}</div>
        </div>
      ))}
      <div style={{ background:bg, border:`1.5px solid ${border}`, borderRadius:10, padding:"14px 16px", marginTop:8 }}>
        <div style={{ fontWeight:"bold", color, marginBottom:6, fontSize:13 }}>💡 't Kofschip mnemonic</div>
        <div style={{ fontSize:13, color:"#475569" }}>Letters in <strong>'t kofschip</strong>: t · k · o · f · s · c · h · i · p — if the verb stem ends in one of these, use <strong>-te/-ten</strong> and past participle <strong>-t</strong>. Otherwise use <strong>-de/-den</strong> and <strong>-d</strong>.</div>
      </div>
    </div>
  );
}

function ConjugationFlash() {
  const color = "#be185d"; const bg = "#fdf2f8"; const border = "#fbcfe8";
  const allCards = [];
  CONJ_VERBS.forEach(v => {
    const pres = conjugatePresent(v);
    allCards.push({ q:`${v.inf} — ik (present)`, a:pres[0], note:v.en });
    allCards.push({ q:`${v.inf} — hij/zij/het (present)`, a:pres[2], note:v.en });
    allCards.push({ q:`${v.inf} — ik (past)`, a:v.p1, note:v.en });
    allCards.push({ q:`${v.inf} — wij (past)`, a:v.ppast, note:v.en });
    allCards.push({ q:`${v.inf} — past participle`, a:v.pp, note:v.en });
  });

  const [queue, setQueue] = useState(() => shuffle([...allCards]));
  const [flipped, setFlipped] = useState(false);
  const [known, setKnown] = useState(0);
  const [streak, setStreak] = useState(0);
  const total = allCards.length;
  const card = queue[0];
  const done = queue.length === 0;

  function doReset() { setQueue(shuffle([...allCards])); setFlipped(false); setKnown(0); setStreak(0); }
  function next(verdict) {
    setFlipped(false);
    if (verdict === "know") { setKnown(k=>k+1); setStreak(s=>s+1); setQueue(q=>q.slice(1)); }
    else { setStreak(0); setQueue(q => { const [c,...r]=q; const p=Math.min(3,r.length); return [...r.slice(0,p),c,...r.slice(p)]; }); }
  }

  if (done) return (
    <div style={{ textAlign:"center", padding:40 }}>
      <Ring pct={100} size={72} color={color} />
      <div style={{ fontSize:32, margin:"12px 0 4px" }}>🎉</div>
      <h2>All {total} forms done!</h2>
      <div style={{ display:"flex", gap:10, justifyContent:"center", marginTop:16 }}>
        <button onClick={doReset} style={{ padding:"10px 24px", background:color, color:"white", border:"none", borderRadius:8, fontSize:14, cursor:"pointer", fontWeight:"bold" }}>↺ Again</button>
      </div>
    </div>
  );

  const pct = Math.round((known/total)*100);
  return (
    <div>
      <VocabProgress known={known} total={total} streak={streak} color={color} onReset={doReset} />
      <div onClick={() => setFlipped(f=>!f)} style={{ background:flipped?bg:"white", border:`2px solid ${flipped?border:"#e2e8f0"}`, borderRadius:14, padding:28, minHeight:160, cursor:"pointer", transition:"all 0.2s", marginBottom:14, display:"flex", flexDirection:"column", justifyContent:"center", alignItems:"center", textAlign:"center" }}>
        {!flipped ? (
          <>
            <div style={{ fontSize:11, color:"#94a3b8", textTransform:"uppercase", letterSpacing:1, marginBottom:14 }}>What is the form?</div>
            <div style={{ fontSize:22, fontWeight:"bold", color:"#1e293b", marginBottom:4 }}>{card.q}</div>
            <div style={{ fontSize:12, color:"#94a3b8" }}>tap to reveal</div>
          </>
        ) : (
          <>
            <div style={{ fontSize:11, color, textTransform:"uppercase", letterSpacing:1, marginBottom:10 }}>Answer</div>
            <div style={{ fontSize:28, fontWeight:"bold", color:"#1e293b", marginBottom:4 }}>{card.a}</div>
            <div style={{ fontSize:13, color:"#64748b" }}>{card.q}</div>
            <div style={{ fontSize:11, color:"#94a3b8", marginTop:4 }}>{card.note}</div>
          </>
        )}
      </div>
      {flipped ? (
        <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
          <button onClick={()=>next("unsure")} style={{ padding:"12px 20px", background:"#fee2e2", color:"#dc2626", border:"none", borderRadius:8, fontSize:14, cursor:"pointer", fontWeight:"bold", flex:1, maxWidth:180 }}>😕 Again</button>
          <button onClick={()=>next("know")}   style={{ padding:"12px 20px", background:bg, color, border:"none", borderRadius:8, fontSize:14, cursor:"pointer", fontWeight:"bold", flex:1, maxWidth:180 }}>✓ Got it</button>
        </div>
      ) : <div style={{ textAlign:"center", color:"#94a3b8", fontSize:12 }}>👆 Tap to reveal</div>}
    </div>
  );
}

function ConjugationQuiz() {
  const color = "#be185d"; const bg = "#fdf2f8"; const border = "#fbcfe8";
  // Quiz: show verb + pronoun, user picks the correct form from 4 options
  const FORMS = ['present_ik','present_hij','past_ik','past_wij','pp'];
  const FORM_LABEL = { present_ik:"ik (present)", present_hij:"hij (present)", past_ik:"ik (past)", past_wij:"wij (past)", pp:"past participle" };

  const [questions, setQuestions] = useState(null);
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const [answers, setAnswers] = useState([]);

  function start() {
    const qs = shuffle(CONJ_VERBS.slice()).slice(0,15).map(v => {
      const pres = conjugatePresent(v);
      const formMap = { present_ik:pres[0], present_hij:pres[2], past_ik:v.p1, past_wij:v.ppast, pp:v.pp };
      const form = FORMS[Math.floor(Math.random()*FORMS.length)];
      const correct = formMap[form];
      // Distractors from other verbs same form
      const dists = shuffle(CONJ_VERBS.filter(x=>x.inf!==v.inf)).slice(0,3).map(x => {
        const p2 = conjugatePresent(x);
        const fm = { present_ik:p2[0], present_hij:p2[2], past_ik:x.p1, past_wij:x.ppast, pp:x.pp };
        return fm[form];
      }).filter(d => d !== correct);
      const opts = shuffle([correct, ...dists.slice(0,3)]);
      return { v, form, correct, opts };
    });
    setQuestions(qs); setIdx(0); setSelected(null); setScore(0); setDone(false); setAnswers([]);
  }

  if (!questions) return (
    <div style={{ textAlign:"center", padding:40 }}>
      <div style={{ fontSize:48, marginBottom:12 }}>⚡</div>
      <h2 style={{ marginBottom:8 }}>Conjugation Quiz</h2>
      <p style={{ color:"#64748b", fontSize:13, marginBottom:24 }}>Pick the correct verb form. 15 questions.</p>
      <button onClick={start} style={{ padding:"12px 28px", background:color, color:"white", border:"none", borderRadius:8, fontSize:14, cursor:"pointer", fontWeight:"bold" }}>Start →</button>
    </div>
  );

  if (done) {
    const pct = Math.round((score/15)*100);
    return (
      <div>
        <div style={{ textAlign:"center", marginBottom:20 }}>
          <Ring pct={pct} size={72} color={pct>=80?"#16a34a":pct>=60?"#ca8a04":"#dc2626"} />
          <h2 style={{ margin:"10px 0 4px" }}>{score}/15</h2>
          <p style={{ color:"#64748b", fontSize:13 }}>{pct>=80?"Uitstekend! 🇳🇱":pct>=60?"Goed gedaan!":"Keep practising!"}</p>
        </div>
        {answers.map((a,i) => (
          <div key={i} style={{ display:"flex", gap:8, padding:"8px 12px", borderRadius:8, marginBottom:6, background:a.correct?"#f0fdf4":"#fef2f2", border:`1px solid ${a.correct?"#bbf7d0":"#fecaca"}` }}>
            <span>{a.correct?"✅":"❌"}</span>
            <div style={{ fontSize:13 }}><strong>{a.v.inf}</strong> ({FORM_LABEL[a.form]}) → <strong>{a.ans}</strong>{!a.correct && <span style={{ color:"#dc2626" }}> (correct: {a.correct_ans})</span>}</div>
          </div>
        ))}
        <div style={{ display:"flex", gap:10, justifyContent:"center", marginTop:16 }}>
          <button onClick={start} style={{ padding:"10px 24px", background:color, color:"white", border:"none", borderRadius:8, fontSize:14, cursor:"pointer", fontWeight:"bold" }}>↺ Again</button>
        </div>
      </div>
    );
  }

  const { v, form, correct, opts } = questions[idx];
  const isCorrect = selected === correct;
  function choose(opt) {
    if (selected) return;
    setSelected(opt);
    if (opt===correct) setScore(s=>s+1);
    setAnswers(prev => [...prev, { v, form, ans:opt, correct:opt===correct, correct_ans:correct }]);
  }
  function next() { setSelected(null); if (idx+1>=15) setDone(true); else setIdx(i=>i+1); }

  return (
    <div>
      <div style={{ marginBottom:14 }}>
        <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#94a3b8", marginBottom:4 }}><span>{idx+1}/15</span><span>🏅 {score}</span></div>
        <div style={{ height:7, background:"#e2e8f0", borderRadius:4, overflow:"hidden" }}><div style={{ width:`${(idx/15)*100}%`, height:"100%", background:color, transition:"width 0.3s", borderRadius:4 }} /></div>
      </div>
      <div style={{ background:"white", border:"1.5px solid #e2e8f0", borderRadius:12, padding:24, marginBottom:16, textAlign:"center" }}>
        <div style={{ fontSize:11, color:"#94a3b8", textTransform:"uppercase", letterSpacing:1, marginBottom:12 }}>{FORM_LABEL[form]}</div>
        <div style={{ fontSize:28, fontWeight:"bold", color:"#1e293b", marginBottom:4 }}>{v.inf}</div>
        <div style={{ fontSize:13, color:"#64748b" }}>{v.en}</div>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:14 }}>
        {opts.map(opt => {
          const picked = !!selected, isThis = opt===correct;
          let obg="white", oborder="#e2e8f0", ocol="#1e293b";
          if (picked) { if (isThis){obg=bg;oborder=color;ocol=color;} else if (opt===selected){obg="#fef2f2";oborder="#dc2626";ocol="#dc2626";} }
          return <button key={opt} onClick={()=>choose(opt)} style={{ padding:"12px 16px", borderRadius:9, border:`2px solid ${oborder}`, background:obg, color:ocol, fontSize:16, fontWeight:"bold", cursor:picked?"default":"pointer", transition:"all 0.15s" }}>{opt}</button>;
        })}
      </div>
      {selected && <div style={{ background:isCorrect?"#f0fdf4":"#fef2f2", border:`1.5px solid ${isCorrect?"#86efac":"#fca5a5"}`, borderRadius:10, padding:12, marginBottom:12 }}><strong style={{ color:isCorrect?"#16a34a":"#dc2626" }}>{isCorrect?"✅ Correct!":"❌ "+correct}</strong></div>}
      {selected && <div style={{ textAlign:"center" }}><button onClick={next} style={{ padding:"10px 24px", background:color, color:"white", border:"none", borderRadius:8, fontSize:14, cursor:"pointer", fontWeight:"bold" }}>{idx+1<15?"Next →":"Results"}</button></div>}
    </div>
  );
}

function WordOrderGuide() {
  const color = "#b45309"; const bg = "#fffbeb"; const border = "#fde68a";
  const rules = [
    { icon:"1️⃣", title:"The V2 Rule (verb-second)", body:"In a Dutch main clause, the finite (conjugated) verb is ALWAYS the second element — no matter what comes first. If an adverb or object is moved to the front, the subject flips with the verb.\n\nExamples:\n• Ik ga morgen naar Amsterdam.\n• Morgen ga ik naar Amsterdam.\n• Gisteren zag hij een film." },
    { icon:"2️⃣", title:"Subject-Verb-Object (basic order)", body:"The default order is SVO — same as English:\n\n• Ik lees een boek. (I read a book.)\n• Hij koopt een fiets. (He buys a bicycle.)\n\nThis is the most common sentence structure." },
    { icon:"3️⃣", title:"Time – Manner – Place", body:"When combining adverbials, Dutch follows: TIME first, then MANNER, then PLACE.\n\n• Ik ga morgen (time) met de trein (manner) naar Utrecht (place).\n• Hij reist elke dag (time) snel (manner) door de stad (place)." },
    { icon:"4️⃣", title:"Negation with 'niet'", body:"'Niet' (not) goes:\n• After the direct object: Ik zie hem niet.\n• Before adjectives: Hij is niet groot.\n• Before infinitives/past participles: Ik kan het niet doen.\n• Before prepositional phrases: We gaan niet naar huis." },
    { icon:"5️⃣", title:"Subordinate clauses — verb to the end", body:"In a subordinate clause (after omdat, dat, als, wanneer, die, dat…), the finite verb moves to the END of the clause:\n\n• Ik weet dat hij morgen komt.\n• Ze werkt hard omdat ze geld nodig heeft.\n• De man die hier woont is mijn vader." },
    { icon:"6️⃣", title:"Perfect tense word order", body:"With a perfect tense, the auxiliary (hebben/zijn) is verb-2, and the past participle goes to the end:\n\n• Main clause: Ik heb een boek gelezen.\n• Subclause: ...omdat ik een boek heb gelezen.\n\nNote the auxiliary comes before the participle in subclauses." },
  ];

  return (
    <div>
      <div style={{ background:bg, border:`1.5px solid ${border}`, borderRadius:10, padding:"14px 16px", marginBottom:20 }}>
        <div style={{ fontWeight:"bold", color, fontSize:15, marginBottom:4 }}>🔢 The Golden Rule</div>
        <div style={{ fontSize:13, color:"#78350f" }}>In a Dutch main clause, the conjugated verb is <strong>always in position 2</strong>. Everything else arranges around it.</div>
      </div>
      {rules.map((r,i) => (
        <div key={i} style={{ marginBottom:12, padding:"14px 16px", background:"white", borderRadius:10, border:"1.5px solid #f1f5f9" }}>
          <div style={{ fontWeight:"bold", color, marginBottom:6, fontSize:14 }}>{r.icon} {r.title}</div>
          <div style={{ color:"#475569", fontSize:13, lineHeight:1.7, whiteSpace:"pre-line" }}>{r.body}</div>
        </div>
      ))}
    </div>
  );
}

function WordOrderExercise() {
  const color = "#b45309"; const bg = "#fffbeb"; const border = "#fde68a";
  const [qIdx, setQIdx] = useState(0);
  const [placed, setPlaced] = useState([]);
  const [bank, setBank] = useState(() => shuffle([...WO_EXERCISES[0].words]));
  const [checked, setChecked] = useState(false);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);

  const q = WO_EXERCISES[qIdx];

  function loadQ(i) {
    setQIdx(i); setPlaced([]); setBank(shuffle([...WO_EXERCISES[i].words])); setChecked(false);
  }
  function pickWord(w, i) {
    if (checked) return;
    setBank(b => b.filter((_,idx)=>idx!==i));
    setPlaced(p => [...p, w]);
  }
  function removeWord(w, i) {
    if (checked) return;
    setPlaced(p => p.filter((_,idx)=>idx!==i));
    setBank(b => [...b, w]);
  }
  function check() {
    const correct = placed.join(" ").toLowerCase() === q.answer.join(" ").toLowerCase();
    if (correct) setScore(s=>s+1);
    setChecked(true);
  }
  function next() {
    if (qIdx+1 >= WO_EXERCISES.length) setDone(true);
    else loadQ(qIdx+1);
  }
  function restart() { setScore(0); setDone(false); loadQ(0); }

  const isCorrect = placed.join(" ").toLowerCase() === q.answer.join(" ").toLowerCase();
  const pct = Math.round((qIdx/WO_EXERCISES.length)*100);

  if (done) return (
    <div style={{ textAlign:"center", padding:40 }}>
      <Ring pct={Math.round((score/WO_EXERCISES.length)*100)} size={80} color={color} />
      <h2 style={{ margin:"16px 0 4px" }}>{score}/{WO_EXERCISES.length}</h2>
      <p style={{ color:"#64748b", marginBottom:20 }}>{score>=10?"Uitstekend! 🇳🇱":score>=7?"Goed gedaan!":"Keep practising!"}</p>
      <button onClick={restart} style={{ padding:"10px 24px", background:color, color:"white", border:"none", borderRadius:8, fontSize:14, cursor:"pointer", fontWeight:"bold" }}>↺ Again</button>
    </div>
  );

  return (
    <div>
      <div style={{ marginBottom:16 }}>
        <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#94a3b8", marginBottom:4 }}><span>{qIdx+1}/{WO_EXERCISES.length}</span><span>🏅 {score}</span></div>
        <div style={{ height:7, background:"#e2e8f0", borderRadius:4, overflow:"hidden" }}><div style={{ width:`${pct}%`, height:"100%", background:color, transition:"width 0.3s", borderRadius:4 }} /></div>
      </div>
      <div style={{ background:bg, border:`1.5px solid ${border}`, borderRadius:10, padding:"12px 14px", marginBottom:16 }}>
        <div style={{ fontSize:11, color:"#92400e", fontWeight:"bold", textTransform:"uppercase", letterSpacing:1, marginBottom:6 }}>Arrange into a correct Dutch sentence</div>
        <div style={{ fontSize:12, color:"#92400e" }}>💡 {q.hint}</div>
      </div>

      {/* Drop zone */}
      <div style={{ minHeight:52, background:"white", border:`2px dashed ${checked?(isCorrect?"#86efac":"#fca5a5"):"#e2e8f0"}`, borderRadius:10, padding:"10px 12px", marginBottom:14, display:"flex", flexWrap:"wrap", gap:6, alignItems:"center", transition:"border 0.2s" }}>
        {placed.length === 0 && <span style={{ color:"#cbd5e1", fontSize:13 }}>Tap words below to place them here…</span>}
        {placed.map((w,i) => (
          <button key={i} onClick={()=>removeWord(w,i)} style={{ padding:"6px 12px", background: checked?(isCorrect?"#dcfce7":"#fee2e2"):bg, border:`1.5px solid ${checked?(isCorrect?"#86efac":"#fca5a5"):border}`, borderRadius:20, fontSize:14, cursor:checked?"default":"pointer", fontWeight:"bold", color: checked?(isCorrect?"#15803d":"#dc2626"):color }}>
            {w}
          </button>
        ))}
      </div>

      {/* Word bank */}
      <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:16 }}>
        {bank.map((w,i) => (
          <button key={i} onClick={()=>pickWord(w,i)} style={{ padding:"8px 14px", background:"white", border:"1.5px solid #e2e8f0", borderRadius:20, fontSize:14, cursor:checked?"default":"pointer", color:"#1e293b", fontWeight:"bold" }}>{w}</button>
        ))}
      </div>

      {!checked && placed.length > 0 && (
        <div style={{ textAlign:"center" }}>
          <button onClick={check} style={{ padding:"10px 28px", background:color, color:"white", border:"none", borderRadius:8, fontSize:14, cursor:"pointer", fontWeight:"bold" }}>Check ✓</button>
        </div>
      )}

      {checked && (
        <div style={{ background:isCorrect?"#f0fdf4":"#fef2f2", border:`1.5px solid ${isCorrect?"#86efac":"#fca5a5"}`, borderRadius:10, padding:14, marginBottom:12 }}>
          <strong style={{ color:isCorrect?"#16a34a":"#dc2626" }}>{isCorrect?"✅ Correct!":"❌ Not quite"}</strong>
          {!isCorrect && <div style={{ fontSize:13, color:"#475569", marginTop:6 }}>Correct order: <strong>{q.answer.join(" ")}</strong></div>}
          <div style={{ textAlign:"center", marginTop:12 }}>
            <button onClick={next} style={{ padding:"10px 24px", background:color, color:"white", border:"none", borderRadius:8, fontSize:14, cursor:"pointer", fontWeight:"bold" }}>{qIdx+1<WO_EXERCISES.length?"Next →":"Results"}</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── SIDEBAR (shared between home + section views) ───────────────────────────
function Sidebar({ open, onClose, sectionId, itemId, onHome, onNavigate, onSectionPick }) {
  // Only the active section is expanded; others are collapsed
  const [openSections, setOpenSections] = useState(
    Object.fromEntries(SECTIONS.map(s => [s.id, s.id === sectionId]))
  );

  // When sectionId changes from outside, expand that section
  const prevSecId = useState(sectionId)[0];
  if (sectionId !== prevSecId) {
    // expand new active section
  }

  function toggleSection(id) {
    setOpenSections(p => ({ ...p, [id]: !p[id] }));
  }

  function handleSectionClick(sec) {
    // Navigate to section picker — chevron separately controls expand/collapse
    if (onSectionPick) onSectionPick(sec.id);
    onClose();
  }

  // Swipe-to-close support
  const touchStartX = useState(null);

  function handleTouchStart(e) {
    touchStartX[1](e.touches[0].clientX);
  }
  function handleTouchEnd(e) {
    const startX = touchStartX[0];
    if (startX !== null) {
      const dx = e.changedTouches[0].clientX - startX;
      if (dx < -60) onClose(); // swipe left to close
    }
    touchStartX[1](null);
  }

  return (
    <>
      {/* Backdrop */}
      <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.35)", zIndex:40, backdropFilter:"blur(2px)", opacity: open ? 1 : 0, pointerEvents: open ? "auto" : "none", transition:"opacity 0.25s ease" }} />

      {/* Drawer */}
      <div
        onTouchStart={handleTouchStart}
        onTouchEnd={handleTouchEnd}
        style={{ position:"fixed", top:0, left:0, bottom:0, width:260, background:"white", zIndex:50, display:"flex", flexDirection:"column", boxShadow:"4px 0 24px rgba(0,0,0,0.15)", transform: open ? "translateX(0)" : "translateX(-100%)", transition:"transform 0.25s cubic-bezier(.4,0,.2,1)" }}>

        {/* Sidebar header */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"16px 16px 14px", borderBottom:"1px solid #f1f5f9" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ display:"flex", flexDirection:"column", gap:2 }}>
              <div style={{ width:24, height:5, background:"#AE1C28", borderRadius:2 }}/>
              <div style={{ width:24, height:5, background:"#e5e7eb", borderRadius:2, border:"1px solid rgba(0,0,0,0.06)" }}/>
              <div style={{ width:24, height:5, background:"#21468B", borderRadius:2 }}/>
            </div>
            <span style={{ fontWeight:700, fontSize:14, color:"#0f172a", letterSpacing:"-0.2px" }}>Dutch Grammar</span>
          </div>
          <button onClick={onClose} style={{ width:30, height:30, borderRadius:8, border:"1px solid #e8ecf0", background:"#f8f9fb", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color:"#64748b" }}>
            <SvgIcon name="close" size={14} />
          </button>
        </div>

        {/* Home */}
        <button onClick={() => { onHome(); onClose(); }}
          style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 16px", border:"none", background:"transparent", cursor:"pointer", borderBottom:"1px solid #f1f5f9", fontFamily:"'Outfit',sans-serif", transition:"background 0.12s" }}
          onMouseEnter={e => e.currentTarget.style.background = "#f8f9fb"}
          onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
          <div style={{ width:30, height:30, borderRadius:8, background:"#f1f5f9", display:"flex", alignItems:"center", justifyContent:"center" }}>
            <SvgIcon name="home" size={14} color="#64748b" />
          </div>
          <span style={{ fontSize:13.5, fontWeight:600, color:"#475569" }}>Home</span>
        </button>

        {/* Section list */}
        <div style={{ flex:1, overflowY:"auto", padding:"8px 0" }}>
          {SECTIONS.map(sec => {
            const isActive = sectionId === sec.id;
            const isOpen = openSections[sec.id];
            const showItems = isOpen || isActive;
            const itemCount = sec.items.length;
            // Each item ~54px tall (padding 9+9 + text ~36)
            const expandedHeight = itemCount * 56;
            return (
              <div key={sec.id}>
                {/* Section row */}
                <div style={{ display:"flex", alignItems:"center", borderRadius:8, margin:"2px 6px", background: isActive ? sec.light : "transparent", transition:"background 0.18s" }}>
                  <button
                    onClick={() => handleSectionClick(sec)}
                    style={{ display:"flex", alignItems:"center", gap:10, flex:1, padding:"10px 10px 10px 10px", border:"none", background:"transparent", cursor:"pointer", fontFamily:"'Outfit',sans-serif", textAlign:"left", borderRadius:8 }}
                    onMouseEnter={e => { if (!isActive) e.currentTarget.closest('div').style.background = `${sec.color}12`; }}
                    onMouseLeave={e => { if (!isActive) e.currentTarget.closest('div').style.background = "transparent"; }}>
                    <div style={{ width:30, height:30, borderRadius:8, background: isActive ? sec.color : "#f1f5f9", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, transition:"background 0.2s, box-shadow 0.2s", boxShadow: isActive ? `0 2px 8px ${sec.color}50` : "none" }}>
                      <SvgIcon name={sec.id} size={15} color={isActive ? "white" : "#64748b"} />
                    </div>
                    <div style={{ minWidth:0 }}>
                      <div style={{ fontSize:13, fontWeight: isActive ? 700 : 500, color: isActive ? sec.color : "#334155", lineHeight:1.2 }}>{sec.label}</div>
                      <div style={{ fontSize:10.5, color:"#94a3b8", marginTop:1 }}>{sec.sublabel}</div>
                    </div>
                  </button>
                  {/* Chevron — only toggles, never navigates */}
                  <button onClick={(e) => { e.stopPropagation(); toggleSection(sec.id); }}
                    style={{ padding:"10px 10px 10px 4px", border:"none", background:"transparent", cursor:"pointer", color: showItems ? sec.color : "#cbd5e1", flexShrink:0, transition:"color 0.2s, transform 0.25s cubic-bezier(.4,0,.2,1)", transform: showItems ? "rotate(0deg)" : "rotate(-90deg)", display:"flex", alignItems:"center" }}>
                    <SvgIcon name="chevronDown" size={13} />
                  </button>
                </div>

                {/* Sub-items — smooth animated expand/collapse */}
                <div style={{ overflow:"hidden", maxHeight: showItems ? `${expandedHeight}px` : "0px", transition:"max-height 0.28s cubic-bezier(.4,0,.2,1)", opacity: showItems ? 1 : 0, transitionProperty:"max-height, opacity", transitionDuration:"0.28s, 0.2s", transitionTimingFunction:"cubic-bezier(.4,0,.2,1), ease" }}>
                  {sec.items.map(item => {
                    const active = isActive && itemId === item.id;
                    return (
                      <button key={item.id}
                        onClick={() => { onNavigate(sec.id, item.id); onClose(); }}
                        style={{ display:"flex", alignItems:"center", gap:8, width:"100%", padding:"9px 12px 9px 50px", border:"none", background: active ? `${sec.color}15` : "transparent", borderLeft:`3px solid ${active ? sec.color : "transparent"}`, cursor:"pointer", fontFamily:"'Outfit',sans-serif", transition:"background 0.15s, border-color 0.15s", textAlign:"left" }}
                        onMouseEnter={e => { if (!active) { e.currentTarget.style.background = `${sec.color}08`; e.currentTarget.style.borderLeftColor = `${sec.color}40`; } }}
                        onMouseLeave={e => { if (!active) { e.currentTarget.style.background = "transparent"; e.currentTarget.style.borderLeftColor = "transparent"; } }}>
                        <SvgIcon name={item.ikey} size={12} color={active ? sec.color : "#94a3b8"} />
                        <div>
                          <div style={{ fontSize:12.5, fontWeight: active ? 600 : 400, color: active ? sec.color : "#475569" }}>{item.label}</div>
                          <div style={{ fontSize:11, color:"#94a3b8" }}>{item.desc}</div>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </>
  );
}

// ─── SECTION PICKER PAGE ──────────────────────────────────────────────────────
// Shown when user clicks a section title from home or sidebar — lets them pick activity
function SectionPicker({ sectionId, onPick, onHome, onSidebarOpen }) {
  const sec = SECTIONS.find(s => s.id === sectionId);
  if (!sec) return null;
  return (
    <div style={{ minHeight:"100vh", background:"#f8f9fb", fontFamily:"'Outfit',sans-serif" }}>
      <link href={FONT_LINK} rel="stylesheet" />
      {/* Header */}
      <div style={{ background:"white", borderBottom:"1px solid #e8ecf0", padding:"0 20px", display:"flex", alignItems:"center", gap:12, height:56, flexShrink:0 }}>
        <FlagStripe onClick={onSidebarOpen} />
        <button onClick={onHome} style={{ display:"flex", alignItems:"center", gap:6, background:"none", border:"none", cursor:"pointer", color:"#94a3b8", fontSize:12.5, fontFamily:"'Outfit',sans-serif", padding:0 }}>
          <SvgIcon name="home" size={13} />
          <span>Home</span>
        </button>
        <SvgIcon name="chevronRight" size={12} color="#cbd5e1" />
        <span style={{ fontSize:12.5, fontWeight:600, color:sec.color }}>{sec.label}</span>
      </div>

      <div style={{ maxWidth:560, margin:"0 auto", padding:"32px 20px" }}>
        {/* Section banner */}
        <div style={{ background:`linear-gradient(135deg, ${sec.color}15, ${sec.light})`, border:`1px solid ${sec.border}`, borderRadius:16, padding:"24px 24px 20px", marginBottom:28, display:"flex", alignItems:"flex-start", gap:16 }}>
          <div style={{ width:48, height:48, borderRadius:14, background:sec.color, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, boxShadow:`0 4px 12px ${sec.color}40` }}>
            <SvgIcon name={sec.id} size={22} color="white" />
          </div>
          <div>
            <div style={{ fontWeight:700, fontSize:20, color:"#0f172a", marginBottom:2 }}>{sec.label}</div>
            <div style={{ fontSize:12, color:sec.color, fontWeight:600, marginBottom:8 }}>{sec.sublabel}</div>
            <div style={{ fontSize:13.5, color:"#475569", lineHeight:1.6 }}>{sec.desc}</div>
          </div>
        </div>

        {/* Activity cards */}
        <p style={{ fontSize:11, fontWeight:700, letterSpacing:2, color:"#94a3b8", textTransform:"uppercase", marginBottom:14 }}>Choose an activity</p>
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          {sec.items.map((item, i) => (
            <button key={item.id} onClick={() => onPick(sec.id, item.id)}
              style={{ display:"flex", alignItems:"center", gap:16, padding:"18px 20px", background:"white", border:`1.5px solid #e8ecf0`, borderRadius:12, cursor:"pointer", textAlign:"left", fontFamily:"'Outfit',sans-serif", transition:"all 0.15s", boxShadow:"0 1px 3px rgba(0,0,0,0.04)" }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = sec.color; e.currentTarget.style.background = sec.light; e.currentTarget.style.boxShadow = `0 2px 12px ${sec.color}20`; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = "#e8ecf0"; e.currentTarget.style.background = "white"; e.currentTarget.style.boxShadow = "0 1px 3px rgba(0,0,0,0.04)"; }}>
              <div style={{ width:40, height:40, borderRadius:11, background:sec.light, border:`1.5px solid ${sec.border}`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                <SvgIcon name={item.ikey} size={18} color={sec.color} />
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:600, fontSize:15, color:"#0f172a", marginBottom:3 }}>{item.label}</div>
                <div style={{ fontSize:12.5, color:"#64748b" }}>{item.desc}</div>
              </div>
              <SvgIcon name="chevronRight" size={16} color="#cbd5e1" />
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── HOME SCREEN ──────────────────────────────────────────────────────────────
function HomeScreen({ onNavigate, onSectionPick, onSidebarOpen }) {
  return (
    <div style={{ minHeight:"100vh", background:"#f8f9fb", fontFamily:"'Outfit',sans-serif" }}>
      <link href={FONT_LINK} rel="stylesheet" />

      {/* Hero */}
      <div style={{ background:"linear-gradient(135deg, #0f2044 0%, #1e3a5f 60%, #1d4ed8 100%)", position:"relative", overflow:"hidden" }}>
        {/* Background circles */}
        <div style={{ position:"absolute", top:-40, right:-40, width:200, height:200, borderRadius:"50%", background:"rgba(255,255,255,0.04)" }}/>
        <div style={{ position:"absolute", bottom:-60, left:-20, width:160, height:160, borderRadius:"50%", background:"rgba(255,255,255,0.04)" }}/>
        <div style={{ position:"absolute", right:24, bottom:0, opacity:1 }}><WindmillSVG /></div>

        {/* Top bar with flag button */}
        <div style={{ display:"flex", alignItems:"center", padding:"14px 20px 0" }}>
          <FlagStripe onClick={onSidebarOpen} style={{ opacity:0.9 }} />
        </div>

        <div style={{ maxWidth:600, margin:"0 auto", padding:"20px 24px 44px", position:"relative" }}>
          <h1 style={{ color:"white", fontSize:32, fontWeight:700, margin:"0 0 8px", letterSpacing:"-0.5px", lineHeight:1.2 }}>
            Dutch Grammar
          </h1>
          <p style={{ color:"rgba(255,255,255,0.65)", fontSize:15, margin:0, fontWeight:300 }}>
            7 topics · 5,000 words · progress tracking
          </p>
        </div>
      </div>

      {/* Section cards */}
      <div style={{ maxWidth:680, margin:"0 auto", padding:"28px 16px 40px" }}>
        <p style={{ fontSize:11, fontWeight:700, letterSpacing:2, color:"#94a3b8", textTransform:"uppercase", marginBottom:16, paddingLeft:4 }}>Topics</p>

        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          {SECTIONS.map(sec => (
            <div key={sec.id} style={{ background:"white", borderRadius:14, overflow:"hidden", boxShadow:"0 1px 3px rgba(0,0,0,0.06)", border:"1px solid rgba(0,0,0,0.06)" }}>
              {/* Section header — click to go to section picker */}
              <button
                onClick={() => onSectionPick(sec.id)}
                style={{ width:"100%", padding:"16px 18px 14px", borderBottom:`1px solid ${sec.border}30`, background:`linear-gradient(to right, ${sec.light}, white)`, border:"none", cursor:"pointer", textAlign:"left", fontFamily:"'Outfit',sans-serif", transition:"opacity 0.12s" }}
                onMouseEnter={e => e.currentTarget.style.opacity = "0.85"}
                onMouseLeave={e => e.currentTarget.style.opacity = "1"}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                    <div style={{ width:36, height:36, borderRadius:10, background:sec.color, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, boxShadow:`0 2px 8px ${sec.color}40` }}>
                      <SvgIcon name={sec.id} size={18} color="white" />
                    </div>
                    <div>
                      <div style={{ fontWeight:700, color:"#0f172a", fontSize:15, lineHeight:1.2 }}>{sec.label}</div>
                      <div style={{ fontSize:11, color:sec.color, fontWeight:600, marginTop:1 }}>{sec.sublabel}</div>
                    </div>
                  </div>
                  <SvgIcon name="chevronRight" size={16} color="#cbd5e1" />
                </div>
                <p style={{ margin:"10px 0 0 48px", fontSize:12.5, color:"#64748b", lineHeight:1.5, textAlign:"left" }}>{sec.desc}</p>
              </button>

              {/* Quick-access activity buttons */}
              <div style={{ display:"grid", gridTemplateColumns: sec.items.length === 1 ? "1fr" : sec.items.length <= 3 ? `repeat(${sec.items.length}, 1fr)` : "1fr 1fr", padding:"4px" }}>
                {sec.items.map(item => (
                  <button key={item.id} onClick={() => onNavigate(sec.id, item.id)}
                    style={{ display:"flex", alignItems:"center", gap:8, padding:"11px 14px", background:"transparent", border:"none", cursor:"pointer", borderRadius:10, textAlign:"left", fontFamily:"'Outfit',sans-serif", transition:"background 0.12s" }}
                    onMouseEnter={e => e.currentTarget.style.background = sec.light}
                    onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                    <SvgIcon name={item.ikey} size={14} color={sec.color} />
                    <div>
                      <div style={{ fontSize:13, fontWeight:600, color:"#1e293b" }}>{item.label}</div>
                      <div style={{ fontSize:11, color:"#94a3b8", marginTop:1 }}>{item.desc}</div>
                    </div>
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>

        <div style={{ display:"flex", justifyContent:"center", gap:16, marginTop:36, opacity:0.6 }}>
          {[...Array(5)].map((_, i) => <TulipSVG key={i} />)}
        </div>
      </div>
    </div>
  );
}

// ─── SECTION CONTENT VIEW ─────────────────────────────────────────────────────
function SectionView({ sectionId, itemId, onHome, onNavigate, onSectionPick, onSidebarOpen }) {
  const activeSec  = SECTIONS.find(s => s.id === sectionId);
  const activeItem = activeSec?.items.find(i => i.id === itemId);
  const ActiveComp = activeItem?.component;

  return (
    <div style={{ minHeight:"100vh", background:"#f8f9fb", fontFamily:"'Outfit',sans-serif", display:"flex", flexDirection:"column" }}>
      <link href={FONT_LINK} rel="stylesheet" />

      {/* Top bar */}
      <div style={{ background:"white", borderBottom:"1px solid #e8ecf0", padding:"0 20px", display:"flex", alignItems:"center", gap:8, height:56, flexShrink:0 }}>
        <FlagStripe onClick={onSidebarOpen} />
        <button onClick={onHome} style={{ display:"flex", alignItems:"center", gap:5, background:"none", border:"none", cursor:"pointer", color:"#94a3b8", fontSize:12.5, fontFamily:"'Outfit',sans-serif", padding:0 }}>
          <SvgIcon name="home" size={13} />
          <span>Home</span>
        </button>
        <SvgIcon name="chevronRight" size={12} color="#cbd5e1" />
        {activeSec && (
          <>
            <button onClick={() => onSectionPick(sectionId)} style={{ display:"flex", alignItems:"center", gap:5, background:"none", border:"none", cursor:"pointer", color:activeSec.color, fontSize:12.5, fontFamily:"'Outfit',sans-serif", padding:0, fontWeight:600 }}>
              <SvgIcon name={activeSec.id} size={13} color={activeSec.color} />
              <span>{activeSec.label}</span>
            </button>
            <SvgIcon name="chevronRight" size={12} color="#cbd5e1" />
            <span style={{ fontSize:12.5, color:"#1e293b", fontWeight:600 }}>{activeItem?.label}</span>
          </>
        )}
      </div>

      {/* Content */}
      <div style={{ flex:1, overflowY:"auto", padding:"24px 20px" }}>
        <div style={{ maxWidth:680, margin:"0 auto" }}>
          {ActiveComp && <ActiveComp />}
        </div>
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [screen,     setScreen]     = useState("home");      // "home" | "picker" | "content"
  const [sectionId,  setSectionId]  = useState(null);
  const [itemId,     setItemId]     = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  function navigate(sec, item)  { setSectionId(sec); setItemId(item); setScreen("content"); }
  function goHome()             { setScreen("home"); setSectionId(null); setItemId(null); }
  function goToPicker(secId)    { setSectionId(secId); setItemId(null); setScreen("picker"); }

  return (
    <div style={{ fontFamily:"'Outfit', sans-serif" }}>
      <link href={FONT_LINK} rel="stylesheet" />

      {/* Global sidebar — available on all screens */}
      <Sidebar
        open={sidebarOpen}
        onClose={() => setSidebarOpen(false)}
        sectionId={sectionId}
        itemId={itemId}
        onHome={goHome}
        onNavigate={navigate}
        onSectionPick={(secId) => { goToPicker(secId); }}
      />

      {screen === "home" && (
        <HomeScreen
          onNavigate={navigate}
          onSectionPick={goToPicker}
          onSidebarOpen={() => setSidebarOpen(true)}
        />
      )}
      {screen === "picker" && (
        <SectionPicker
          sectionId={sectionId}
          onPick={navigate}
          onHome={goHome}
          onSidebarOpen={() => setSidebarOpen(true)}
        />
      )}
      {screen === "content" && (
        <SectionView
          sectionId={sectionId}
          itemId={itemId}
          onHome={goHome}
          onNavigate={navigate}
          onSectionPick={goToPicker}
          onSidebarOpen={() => setSidebarOpen(true)}
        />
      )}
    </div>
  );
}


// Mount app
const _root = ReactDOM.createRoot(document.getElementById('root'));
_root.render(React.createElement(App));
</script>
</body>
</html>
